<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Raqmetrics — Launch Readiness System</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Merriweather:wght@300;400;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
:root{
  --bg:#ffffff;--bg2:#f7f6f3;--bg3:#f0ede8;--bg4:#e8e4dd;
  --ink:#111110;--ink70:rgba(17,17,16,.7);--ink50:rgba(17,17,16,.5);--ink30:rgba(17,17,16,.3);--ink10:rgba(17,17,16,.1);--ink05:rgba(17,17,16,.05);
  --amber:#F25C05;--amber-h:#D94E00;--amber-l:#FFF0E6;
  --a30:rgba(242,92,5,.3);--a20:rgba(242,92,5,.2);--a12:rgba(242,92,5,.12);--a06:rgba(242,92,5,.06);
  --border:#e3e1dc;--border2:#d4d0c8;
  --card:#ffffff;--shadow:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.04);--shadow-lg:0 8px 40px rgba(0,0,0,.09);
  --green:#1a7a3c;--green-l:rgba(26,122,60,.1);--green-b:rgba(26,122,60,.2);
  --red:#c0392b;--red-l:rgba(192,57,43,.08);--red-b:rgba(192,57,43,.18);
  --blue:#1e4db7;--blue-l:rgba(30,77,183,.08);--blue-b:rgba(30,77,183,.18);
  --yellow:#c89b00;--yellow-l:rgba(200,155,0,.1);--yellow-b:rgba(200,155,0,.22);
  --f-d:'Playfair Display',Georgia,serif;
  --f-b:'Merriweather',Georgia,serif;
  --f-m:'DM Mono',monospace;
  --r:10px;--t:.2s;--ease:cubic-bezier(.4,0,.2,1);
}
[data-theme="dark"]{
  --bg:#0e0d0c;--bg2:#161512;--bg3:#1e1c18;--bg4:#252320;
  --ink:#f0ede8;--ink70:rgba(240,237,232,.7);--ink50:rgba(240,237,232,.5);--ink30:rgba(240,237,232,.3);--ink10:rgba(240,237,232,.1);--ink05:rgba(240,237,232,.05);
  --border:#2a2722;--border2:#363028;--card:#1a1815;
  --shadow:0 1px 3px rgba(0,0,0,.3),0 4px 16px rgba(0,0,0,.2);--shadow-lg:0 8px 40px rgba(0,0,0,.4);
  --amber-l:rgba(242,92,5,.15);--green-l:rgba(26,122,60,.15);--red-l:rgba(192,57,43,.12);--blue-l:rgba(30,77,183,.12);--yellow-l:rgba(200,155,0,.12);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--ink);font-family:var(--f-b);line-height:1.7;-webkit-font-smoothing:antialiased;overflow-x:hidden;transition:background .3s,color .3s;min-height:100vh}
a{text-decoration:none;color:inherit}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select,textarea{font-family:var(--f-m);font-size:.8rem;color:var(--ink);background:var(--bg2);border:1.5px solid var(--border);border-radius:7px;padding:.5rem .75rem;outline:none;transition:border-color var(--t),background var(--t);width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--amber);background:var(--bg)}
input[type=checkbox]{width:auto;accent-color:var(--amber)}
input[type=range]{padding:0;border:none;background:none;accent-color:var(--amber)}
select option{background:var(--bg2)}
textarea{resize:vertical;min-height:72px;line-height:1.6}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
:focus-visible{outline:2px solid var(--amber);outline-offset:2px;border-radius:4px}

/* NAV */
.nav{position:fixed;top:0;left:0;right:0;z-index:900;padding:.9rem 0;background:rgba(255,255,255,.92);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid var(--border);transition:background .3s}
[data-theme=dark] .nav{background:rgba(14,13,12,.92)}
.nav-i{display:flex;align-items:center;justify-content:space-between;max-width:1320px;margin:0 auto;padding:0 clamp(1rem,3vw,2rem)}
.logo{font-family:var(--f-d);font-size:1.2rem;font-weight:900;letter-spacing:-.04em}
.logo span{color:var(--amber)}
.nav-right{display:flex;align-items:center;gap:.6rem}
.theme-btn{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--ink50);transition:all var(--t)}
.theme-btn:hover{border-color:var(--amber);color:var(--amber)}
.back-btn{font-family:var(--f-m);font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;padding:.35rem .85rem;border-radius:999px;border:1.5px solid var(--border);color:var(--ink50);transition:all var(--t);background:none}
.back-btn:hover{border-color:var(--ink);color:var(--ink)}
.avail{display:flex;align-items:center;gap:.4rem;font-family:var(--f-m);font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--amber);background:var(--a12);border:1px solid var(--a30);padding:.25rem .7rem;border-radius:999px}
.avail-dot{width:5px;height:5px;border-radius:50%;background:var(--amber);animation:pulse 1.8s ease infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.6)}}

/* LAYOUT */
.shell{display:flex;min-height:100vh;padding-top:57px}
.sidebar{width:240px;flex-shrink:0;position:fixed;top:57px;left:0;bottom:0;overflow-y:auto;border-right:1px solid var(--border);background:var(--bg2);padding:1.5rem 0;z-index:800;display:flex;flex-direction:column}
.sidebar::-webkit-scrollbar{width:0}
.main{flex:1;margin-left:240px;padding:2rem clamp(1rem,3vw,2.5rem);max-width:calc(1320px - 240px);min-height:calc(100vh - 57px)}
@media(max-width:900px){.sidebar{display:none}.main{margin-left:0}}

/* SIDEBAR */
.sb-section{font-family:var(--f-m);font-size:.55rem;letter-spacing:.2em;text-transform:uppercase;color:var(--ink30);padding:.65rem 1.4rem .35rem;margin-top:.5rem}
.sb-btn{display:flex;align-items:center;gap:.7rem;width:100%;padding:.6rem 1.4rem;font-family:var(--f-m);font-size:.72rem;letter-spacing:.04em;color:var(--ink50);transition:all var(--t);position:relative;text-align:left;background:none;border:none;cursor:pointer}
.sb-btn:hover{color:var(--ink);background:var(--ink05)}
.sb-btn.on{color:var(--amber);background:var(--a06)}
.sb-btn.on::before{content:'';position:absolute;left:0;top:4px;bottom:4px;width:2.5px;background:var(--amber);border-radius:0 2px 2px 0}
.sb-num{font-family:var(--f-m);font-size:.58rem;width:20px;height:20px;border-radius:5px;background:var(--ink10);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all var(--t);color:var(--ink30)}
.sb-btn.on .sb-num{background:var(--a12);color:var(--amber)}
.sb-btn.done .sb-num{background:var(--green-l);color:var(--green)}
.sb-check{margin-left:auto;font-size:.7rem;color:var(--green);opacity:0;transition:opacity var(--t)}
.sb-btn.done .sb-check{opacity:1}
.sb-progress{padding:1.4rem;border-top:1px solid var(--border);margin-top:auto;flex-shrink:0}
.sb-score{font-family:var(--f-d);font-size:1.6rem;font-weight:900;color:var(--amber);text-align:center;line-height:1;margin-bottom:.25rem}
.sb-score-lbl{font-family:var(--f-m);font-size:.55rem;letter-spacing:.12em;text-transform:uppercase;color:var(--ink30);text-align:center;margin-bottom:.85rem}
.sb-prog-label{display:flex;justify-content:space-between;font-family:var(--f-m);font-size:.62rem;color:var(--ink50);margin-bottom:.45rem}
.prog-track{height:3px;background:var(--ink10);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--amber-h),var(--amber));border-radius:2px;transition:width .4s var(--ease)}

/* PAGE HEADER */
.page-hd{margin-bottom:1.75rem;padding-bottom:1.25rem;border-bottom:1px solid var(--border)}
.page-eyebrow{display:inline-flex;align-items:center;gap:.45rem;font-family:var(--f-m);font-size:.6rem;letter-spacing:.16em;text-transform:uppercase;color:var(--amber);background:var(--a06);border:1px solid var(--a20);padding:.22rem .75rem;border-radius:999px;margin-bottom:.75rem}
.page-hd h2{font-family:var(--f-d);font-size:clamp(1.4rem,2.5vw,1.9rem);font-weight:900;letter-spacing:-.04em;line-height:1.1;margin-bottom:.35rem}
.page-hd h2 em{color:var(--amber);font-style:italic}
.page-hd p{font-size:.82rem;color:var(--ink50);line-height:1.85;max-width:580px}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:1.4rem;box-shadow:var(--shadow)}
.card-inner{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:1rem 1.1rem}
.card-accent{border-left:3px solid var(--amber)}
.card-warning{border-left:3px solid var(--red);background:var(--red-l)}
.card-success{border-left:3px solid var(--green);background:var(--green-l)}
.card-caution{border-left:3px solid var(--yellow);background:var(--yellow-l)}

/* GRID */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem}
@media(max-width:1100px){.g4{grid-template-columns:1fr 1fr}}
@media(max-width:750px){.g2,.g3{grid-template-columns:1fr}}

/* FORM */
.field{margin-bottom:1.1rem}
.field:last-child{margin-bottom:0}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
@media(max-width:640px){.field-row{grid-template-columns:1fr}}
.label{display:block;font-family:var(--f-m);font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;color:var(--ink50);margin-bottom:.4rem}
.req{color:var(--red);margin-left:.2rem}
.label-note{font-size:.6rem;color:var(--ink30);margin-left:.4rem;text-transform:none;letter-spacing:0}
.hint{font-family:var(--f-m);font-size:.62rem;color:var(--ink30);margin-top:.3rem}

/* SECTION LABEL */
.sec-lbl{font-family:var(--f-m);font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;color:var(--ink30);margin-bottom:.85rem;display:flex;align-items:center;gap:.55rem}
.sec-lbl::after{content:'';flex:1;height:1px;background:var(--border)}

/* BADGE */
.badge{display:inline-flex;align-items:center;padding:.18rem .65rem;border-radius:999px;font-family:var(--f-m);font-size:.6rem;letter-spacing:.06em;white-space:nowrap;gap:.3rem}
.b-amber{background:var(--a12);color:var(--amber);border:1px solid var(--a20)}
.b-green{background:var(--green-l);color:var(--green);border:1px solid var(--green-b)}
.b-red{background:var(--red-l);color:var(--red);border:1px solid var(--red-b)}
.b-blue{background:var(--blue-l);color:var(--blue);border:1px solid var(--blue-b)}
.b-gray{background:var(--ink05);color:var(--ink50);border:1px solid var(--border)}
.b-yellow{background:var(--yellow-l);color:var(--yellow);border:1px solid var(--yellow-b)}

/* METRIC CARD */
.m-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:1.1rem 1.25rem;box-shadow:var(--shadow);position:relative;overflow:hidden}
.m-card::after{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.m-card.c-amber::after{background:var(--amber)}.m-card.c-green::after{background:var(--green)}
.m-card.c-blue::after{background:var(--blue)}.m-card.c-red::after{background:var(--red)}
.m-lbl{font-family:var(--f-m);font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;color:var(--ink50);margin-bottom:.45rem}
.m-val{font-family:var(--f-d);font-size:1.6rem;font-weight:900;letter-spacing:-.03em;line-height:1.1;color:var(--ink)}
.m-sub{font-family:var(--f-m);font-size:.62rem;color:var(--ink50);margin-top:.3rem}

/* CHANNEL TOGGLE */
.ch-grid{display:flex;flex-wrap:wrap;gap:.5rem}
.ch-btn{display:flex;align-items:center;gap:.55rem;padding:.5rem 1rem;border-radius:8px;border:1.5px solid var(--border);background:var(--bg2);color:var(--ink50);font-family:var(--f-m);font-size:.72rem;transition:all var(--t);cursor:pointer}
.ch-btn:hover{border-color:var(--amber);color:var(--ink)}
.ch-btn.on{border-color:var(--amber);background:var(--a06);color:var(--amber)}
.ch-dot{width:8px;height:8px;border-radius:50%}

/* TAG MULTI SELECT */
.tag-grid{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.25rem}
.tag-opt{padding:.28rem .75rem;border-radius:999px;border:1.5px solid var(--border);background:var(--bg2);color:var(--ink50);font-family:var(--f-m);font-size:.68rem;cursor:pointer;transition:all var(--t)}
.tag-opt:hover{border-color:var(--amber);color:var(--amber)}
.tag-opt.on{border-color:var(--amber);background:var(--a06);color:var(--amber)}

/* SLIDER ROW */
.sl-row{padding:.65rem 0;border-bottom:1px solid var(--border)}
.sl-row:last-child{border-bottom:none}
.sl-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:.3rem}
.sl-lbl{font-size:.8rem;color:var(--ink70);display:flex;align-items:center;gap:.5rem}
.sl-val{font-family:var(--f-m);font-size:.78rem;color:var(--amber);font-weight:500}
.sl-sub{font-family:var(--f-m);font-size:.62rem;color:var(--ink30);margin-bottom:.35rem}

/* NAMING CONVENTION */
.token-rail{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:.85rem}
.token{display:inline-flex;align-items:center;gap:.35rem;padding:.3rem .7rem;border-radius:6px;font-family:var(--f-m);font-size:.68rem;cursor:pointer;transition:all var(--t);border:1.5px solid var(--border);background:var(--bg2);color:var(--ink50)}
.token:hover{border-color:var(--amber);color:var(--amber)}
.token.on{border-color:var(--amber);background:var(--a06);color:var(--amber)}
.token-drag{cursor:grab;color:var(--ink30);font-size:.7rem}
.preview-box{background:var(--bg3);border:1.5px solid var(--border);border-radius:8px;padding:.85rem 1rem;font-family:var(--f-m);font-size:.82rem;color:var(--amber);letter-spacing:.04em;word-break:break-all;position:relative}
.copy-btn{position:absolute;top:.5rem;right:.5rem;padding:.22rem .6rem;border-radius:5px;font-family:var(--f-m);font-size:.6rem;letter-spacing:.08em;border:1px solid var(--border);background:var(--bg);color:var(--ink50);transition:all var(--t);cursor:pointer}
.copy-btn:hover{border-color:var(--amber);color:var(--amber)}
.copy-btn.copied{border-color:var(--green);color:var(--green);background:var(--green-l)}
.name-row{display:flex;align-items:center;gap:.75rem;padding:.65rem .85rem;border-radius:8px;border:1px solid var(--border);background:var(--bg2);margin-bottom:.5rem}
.name-row:last-child{margin-bottom:0}
.name-level{font-family:var(--f-m);font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--ink30);width:70px;flex-shrink:0}
.name-str{font-family:var(--f-m);font-size:.78rem;color:var(--amber);flex:1;word-break:break-all}

/* CAMPAIGN TREE */
.tree-campaign{border:1.5px solid var(--border);border-radius:10px;margin-bottom:.85rem;overflow:hidden}
.tree-campaign:last-child{margin-bottom:0}
.tree-c-hdr{display:flex;align-items:center;gap:.75rem;padding:.85rem 1.1rem;background:var(--bg3);border-bottom:1px solid var(--border)}
.tree-c-icon{font-size:.9rem}
.tree-c-name{font-family:var(--f-m);font-size:.78rem;color:var(--amber);font-weight:500;flex:1;word-break:break-all}
.tree-adset{display:flex;align-items:flex-start;gap:.75rem;padding:.65rem 1.1rem .65rem 2.5rem;border-bottom:1px solid var(--border);background:var(--bg)}
.tree-adset:last-child{border-bottom:none}
.tree-a-name{font-family:var(--f-m);font-size:.72rem;color:var(--ink70);flex:1;word-break:break-all}
.tree-ads{margin-top:.3rem;display:flex;flex-direction:column;gap:.25rem}
.tree-ad{font-family:var(--f-m);font-size:.65rem;color:var(--ink50);padding:.2rem .5rem;background:var(--bg2);border-radius:4px;border:1px solid var(--border)}

/* CHECKLIST */
.check-item{display:flex;align-items:flex-start;gap:.85rem;padding:.85rem 1rem;border-radius:8px;border:1px solid var(--border);background:var(--card);margin-bottom:.55rem;cursor:pointer;transition:all var(--t)}
.check-item:hover{border-color:var(--a20)}
.check-item.done{background:var(--green-l);border-color:var(--green-b)}
.check-item.done .ci-title{color:var(--ink50);text-decoration:line-through}
.check-box{width:20px;height:20px;border-radius:5px;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:all var(--t);font-size:.7rem}
.check-item.done .check-box{background:var(--green);border-color:var(--green);color:#fff}
.ci-title{font-size:.82rem;font-weight:700;color:var(--ink);margin-bottom:.15rem;transition:all var(--t)}
.ci-desc{font-size:.75rem;color:var(--ink50);line-height:1.6}
.ci-tag{margin-top:.35rem}

/* UTM BUILDER */
.utm-box{background:var(--bg3);border:1.5px solid var(--border);border-radius:8px;padding:.85rem 1rem;font-family:var(--f-m);font-size:.75rem;color:var(--ink70);word-break:break-all;line-height:1.8}
.utm-param{color:var(--amber)}
.utm-val{color:var(--blue)}

/* SUMMARY EXPORT */
.export-section{margin-bottom:1.75rem}
.export-section h3{font-family:var(--f-d);font-size:1.05rem;font-weight:700;margin-bottom:.85rem;letter-spacing:-.02em}
.summary-row{display:flex;padding:.55rem 0;border-bottom:1px solid var(--border);align-items:baseline;gap:1rem}
.summary-row:last-child{border-bottom:none}
.sr-key{font-family:var(--f-m);font-size:.68rem;letter-spacing:.06em;text-transform:uppercase;color:var(--ink50);width:160px;flex-shrink:0}
.sr-val{font-size:.82rem;color:var(--ink);font-weight:500;flex:1}

/* CREATIVE BRIEF CARD */
.cr-card{border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:.75rem}
.cr-hdr{display:flex;align-items:center;gap:.65rem;padding:.75rem 1rem;background:var(--bg3);border-bottom:1px solid var(--border)}
.cr-format{font-family:var(--f-m);font-size:.72rem;font-weight:500;color:var(--amber)}
.cr-body{padding:.9rem 1rem;display:grid;grid-template-columns:1fr 1fr;gap:.75rem 1.5rem}
@media(max-width:640px){.cr-body{grid-template-columns:1fr}}
.cr-row{display:flex;flex-direction:column;gap:.2rem}
.cr-lbl{font-family:var(--f-m);font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--ink30)}
.cr-val{font-size:.8rem;color:var(--ink70)}

/* BTN */
.btn-primary{display:inline-flex;align-items:center;gap:.5rem;font-family:var(--f-m);font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;padding:.65rem 1.6rem;border-radius:999px;background:var(--amber);color:#fff;box-shadow:0 4px 18px var(--a30);transition:all var(--t);border:none;cursor:pointer}
.btn-primary:hover{background:var(--amber-h);box-shadow:0 8px 28px var(--a30);transform:translateY(-2px)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
.btn-ghost{display:inline-flex;align-items:center;gap:.5rem;font-family:var(--f-m);font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;padding:.65rem 1.6rem;border-radius:999px;border:1.5px solid var(--border);color:var(--ink50);transition:all var(--t);background:none;cursor:pointer}
.btn-ghost:hover{border-color:var(--ink);color:var(--ink)}
.btn-sm{display:inline-flex;align-items:center;gap:.35rem;font-family:var(--f-m);font-size:.62rem;letter-spacing:.08em;text-transform:uppercase;padding:.4rem 1rem;border-radius:999px;background:var(--bg2);border:1px solid var(--border);color:var(--ink50);transition:all var(--t);cursor:pointer}
.btn-sm:hover{border-color:var(--amber);color:var(--amber)}

/* STEP NAV */
.step-nav{display:flex;justify-content:space-between;align-items:center;margin-top:2rem;padding-top:1.25rem;border-top:1px solid var(--border)}

/* HERO BANNER */
.hero-banner{min-height:calc(100vh - 57px);display:flex;align-items:center;justify-content:center;padding:3rem 1.5rem;text-align:center;background:radial-gradient(ellipse 80% 60% at 50% 40%,var(--a06) 0%,transparent 70%)}
.hero-banner h1{font-family:var(--f-d);font-size:clamp(2.2rem,5.5vw,4.5rem);font-weight:900;letter-spacing:-.05em;line-height:.95;margin-bottom:1.1rem}
.hero-banner h1 em{color:var(--amber);font-style:italic}
.hero-banner p{font-size:.9rem;color:var(--ink50);max-width:500px;margin:0 auto 2rem;line-height:2}
.module-pills{display:flex;flex-wrap:wrap;gap:.5rem;justify-content:center;margin-bottom:2.5rem}
.module-pill{font-family:var(--f-m);font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;padding:.3rem .9rem;border-radius:999px;background:var(--a06);border:1px solid var(--a20);color:var(--amber)}

hr.divider{border:none;border-top:1px solid var(--border);margin:1.25rem 0}

.risk-alert{display:flex;align-items:flex-start;gap:.75rem;padding:.85rem 1rem;border-radius:8px;margin-bottom:.55rem;background:var(--red-l);border:1px solid var(--red-b)}
.risk-icon{font-size:.85rem;flex-shrink:0;margin-top:.05rem}

.score-ring{width:100px;height:100px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-direction:column;border:3px solid var(--border);background:var(--bg2);margin:0 auto 1rem;position:relative}
.score-ring-val{font-family:var(--f-d);font-size:2rem;font-weight:900;letter-spacing:-.04em;line-height:1}
.score-ring-lbl{font-family:var(--f-m);font-size:.5rem;letter-spacing:.12em;text-transform:uppercase;color:var(--ink30)}

/* DECISION BLOCK */
.decision-go{background:var(--green-l);border:2px solid var(--green-b);border-radius:12px;padding:1.5rem;text-align:center}
.decision-caution{background:var(--yellow-l);border:2px solid var(--yellow-b);border-radius:12px;padding:1.5rem;text-align:center}
.decision-nogo{background:var(--red-l);border:2px solid var(--red-b);border-radius:12px;padding:1.5rem;text-align:center}
.decision-label{font-family:var(--f-d);font-size:2rem;font-weight:900;letter-spacing:-.04em;margin-bottom:.5rem}
.decision-sub{font-family:var(--f-m);font-size:.72rem;letter-spacing:.08em;text-transform:uppercase;color:var(--ink50)}

/* HYPOTHESIS CARDS */
.hyp-card{border:1px solid var(--border);border-radius:8px;padding:1rem 1.1rem;margin-bottom:.65rem;background:var(--card)}
.hyp-type{font-family:var(--f-m);font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;color:var(--amber);margin-bottom:.4rem}

/* CREATIVE MATRIX */
.matrix-row{border:1px solid var(--border);border-radius:8px;padding:.85rem 1rem;margin-bottom:.6rem;background:var(--card);display:grid;grid-template-columns:auto 1fr 1fr 1fr 1fr;gap:.75rem;align-items:start}
@media(max-width:900px){.matrix-row{grid-template-columns:1fr 1fr}}

/* WARNING BANNER */
.warn-banner{background:var(--yellow-l);border:1px solid var(--yellow-b);border-radius:8px;padding:.75rem 1rem;margin-bottom:.65rem;display:flex;align-items:flex-start;gap:.65rem}
.warn-text{font-family:var(--f-m);font-size:.72rem;color:var(--yellow);line-height:1.6}

/* MISSING PANEL */
.missing-panel{background:var(--red-l);border:1px solid var(--red-b);border-radius:8px;padding:1rem 1.1rem;margin-bottom:1.25rem}
.missing-title{font-family:var(--f-m);font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;color:var(--red);margin-bottom:.5rem}
.missing-item{font-family:var(--f-m);font-size:.72rem;color:var(--red);padding:.2rem 0;display:flex;align-items:center;gap:.5rem}
.missing-item::before{content:'!';width:14px;height:14px;border-radius:50%;background:var(--red);color:#fff;font-size:.55rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:700}

/* SCORE BREAKDOWN */
.score-bar-row{display:flex;align-items:center;gap:.75rem;padding:.45rem 0;border-bottom:1px solid var(--border)}
.score-bar-row:last-child{border-bottom:none}
.score-bar-label{font-family:var(--f-m);font-size:.65rem;width:160px;flex-shrink:0;color:var(--ink70)}
.score-bar-track{flex:1;height:6px;background:var(--ink10);border-radius:3px;overflow:hidden}
.score-bar-fill{height:100%;border-radius:3px;transition:width .4s var(--ease)}
.score-bar-val{font-family:var(--f-m);font-size:.65rem;width:35px;text-align:right;color:var(--amber);font-weight:500}

/* AUTOSAVE INDICATOR */
.autosave{display:flex;align-items:center;gap:.4rem;font-family:var(--f-m);font-size:.6rem;color:var(--ink30);padding:.25rem .7rem;border-radius:999px;border:1px solid var(--border);background:none}
.autosave-dot{width:5px;height:5px;border-radius:50%;background:var(--green)}
</style>

<script data-presets="env,react" type="text/babel">
const {useState,useMemo,useCallback,useEffect,useRef}=React;

/* ── Benchmark DB ── */
const BM={
  'Ecommerce|Ecom|Meta':{cpm:11,ctr:.016,cvr:.022,cpc:.69},'Ecommerce|Ecom|Google':{cpm:6,ctr:.045,cvr:.032,cpc:.13},
  'Ecommerce|Ecom|TikTok':{cpm:8,ctr:.018,cvr:.014,cpc:.44},'Fashion|Ecom|Meta':{cpm:10,ctr:.018,cvr:.016,cpc:.56},
  'Fashion|Ecom|TikTok':{cpm:7,ctr:.024,cvr:.013,cpc:.29},'Health|Lead Gen|Meta':{cpm:15,ctr:.009,cvr:.045,cpc:1.67},
  'Health|Lead Gen|Google':{cpm:9,ctr:.038,cvr:.055,cpc:.24},'SaaS|Lead Gen|Meta':{cpm:18,ctr:.008,cvr:.050,cpc:2.25},
  'SaaS|Lead Gen|Google':{cpm:12,ctr:.042,cvr:.065,cpc:.29},'Finance|Lead Gen|Meta':{cpm:24,ctr:.006,cvr:.035,cpc:4.0},
  'Finance|Lead Gen|Google':{cpm:18,ctr:.048,cvr:.042,cpc:.38},'Real Estate|Lead Gen|Meta':{cpm:18,ctr:.007,cvr:.040,cpc:2.57},
  'Education|Lead Gen|Meta':{cpm:12,ctr:.010,cvr:.060,cpc:1.2},'Education|Lead Gen|Google':{cpm:7,ctr:.040,cvr:.070,cpc:.175},
  'App|App|Meta':{cpm:8,ctr:.020,cvr:.080,cpc:.40},'App|App|TikTok':{cpm:6,ctr:.025,cvr:.070,cpc:.24},
  'Retail|Ecom|Meta':{cpm:10,ctr:.016,cvr:.021,cpc:.63},'Beauty|Ecom|Meta':{cpm:12,ctr:.017,cvr:.019,cpc:.71},
  'Beauty|Ecom|TikTok':{cpm:9,ctr:.022,cvr:.017,cpc:.41},
};
function getBM(industry,funnel,channel){
  return BM[`${industry}|${funnel}|${channel}`]||BM[`${industry}|${funnel}|Meta`]||{cpm:12,ctr:.012,cvr:.020,cpc:1.0};
}

/* ── Formatters ── */
const f$=(v,d=0)=>v==null||!isFinite(v)?'—':'$'+Number(v).toLocaleString('en',{minimumFractionDigits:d,maximumFractionDigits:d});
const fpct=(v,d=1)=>v==null||!isFinite(v)?'—':(v*100).toFixed(d)+'%';
const fx=(v,d=2)=>v==null||!isFinite(v)?'—':Number(v).toFixed(d)+'x';
const fn=(v,d=0)=>v==null||!isFinite(Number(v))?'—':Number(v).toLocaleString('en',{maximumFractionDigits:d});
const slug=(s)=>s.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'');
const upper=(s)=>String(s).toUpperCase().replace(/[^A-Z0-9]+/g,'_');

/* ── LAUNCH READINESS SCORE ENGINE ── */
function calcReadinessScore(data){
  const dims=[
    {id:'strategy',label:'Strategy & Brief',weight:15,score:()=>{
      let s=0;
      if(data.brand) s+=20;
      if(data.businessGoal&&data.businessGoal.length>10) s+=30;
      if((data.channels||[]).length>0) s+=20;
      if(data.product) s+=15;
      if(data.offer) s+=15;
      return Math.min(s,100);
    }},
    {id:'audience',label:'Audience & ICP Clarity',weight:15,score:()=>{
      let s=0;
      if(data.ageMin&&data.ageMax) s+=20;
      if(data.primaryICP&&data.primaryICP.length>10) s+=25;
      if(data.painPoints&&data.painPoints.length>10) s+=20;
      if(data.buyingTriggers&&data.buyingTriggers.length>5) s+=20;
      if((data.stages||[]).length>0) s+=15;
      return Math.min(s,100);
    }},
    {id:'offer',label:'Offer & Positioning',weight:15,score:()=>{
      let s=0;
      if(data.offerProblem&&data.offerProblem.length>10) s+=25;
      if(data.offerPromise&&data.offerPromise.length>10) s+=25;
      if(data.mainObjection&&data.mainObjection.length>5) s+=20;
      if(data.usp&&data.usp.length>10) s+=30;
      return Math.min(s,100);
    }},
    {id:'creative',label:'Creative Readiness',weight:15,score:()=>{
      let s=0;
      if((data.creativeFormats||[]).length>=2) s+=30;
      if((data.creativeAngles||[]).length>=3) s+=30;
      if((data.msgHypotheses||[]).filter(h=>h.angle&&h.hook).length>=3) s+=40;
      return Math.min(s,100);
    }},
    {id:'tracking',label:'Tracking & Measurement',weight:20,score:()=>{
      const tc=data.trackingChecked||{};
      const critical=['pixel_installed','conv_event','test_events','utm_consistent'];
      let s=0;
      if(data.landingPage) s+=15;
      critical.forEach(k=>{if(tc[k]) s+=15;});
      if(tc.ga4_linked) s+=10;
      if(tc.url_params_test) s+=10;
      return Math.min(s,100);
    }},
    {id:'budget',label:'Budget & Structure Sanity',weight:10,score:()=>{
      let s=0;
      if(data.monthlyBudget&&data.monthlyBudget>0) s+=30;
      const daily=(data.monthlyBudget||0)/30;
      const totalCampaigns=(data.numCampaigns||2)*(data.channels||['Meta']).length;
      const dailyPerCampaign=daily/Math.max(totalCampaigns,1);
      if(dailyPerCampaign>=50) s+=35;else if(dailyPerCampaign>=20) s+=20;
      const chSplitSum=Object.values(data.chSplits||{}).reduce((a,b)=>a+b,0);
      if(Math.abs(chSplitSum-100)<2||Object.keys(data.chSplits||{}).length===0) s+=35;
      return Math.min(s,100);
    }},
    {id:'governance',label:'Launch Governance',weight:10,score:()=>{
      const lc=data.launchChecked||{};
      const done=Object.values(lc).filter(Boolean).length;
      return Math.min(Math.round(done/20*100),100);
    }},
  ];
  const total=dims.reduce((acc,d)=>{
    const raw=d.score();
    return acc+(raw*d.weight/100);
  },0);
  return{score:Math.round(total),dims};
}

function getDecision(score,data){
  const tc=data.trackingChecked||{};
  const blockers=[];
  if(!data.businessGoal||data.businessGoal.length<5) blockers.push('No clear business goal defined');
  if(!data.landingPage) blockers.push('No landing page / conversion path set');
  if(!tc.pixel_installed) blockers.push('Pixel / tracking not verified');
  if(!tc.conv_event) blockers.push('No conversion event configured');
  if((data.creativeFormats||[]).length<1) blockers.push('No creative formats selected');
  if(!data.monthlyBudget||data.monthlyBudget<=0) blockers.push('Budget not defined');
  if((data.channels||[]).length===0) blockers.push('No channels selected');
  if(!data.primaryICP&&!data.ageMin) blockers.push('No primary audience defined');

  if(blockers.length>0) return{verdict:'NO-GO',blockers,color:'var(--red)',cls:'decision-nogo'};
  if(score>=85) return{verdict:'GO',blockers:[],color:'var(--green)',cls:'decision-go'};
  if(score>=70) return{verdict:'GO WITH CAUTION',blockers:[],color:'var(--yellow)',cls:'decision-caution'};
  return{verdict:'NO-GO',blockers:['Readiness score below 70 — fix critical gaps first.'],color:'var(--red)',cls:'decision-nogo'};
}

function getRiskWarnings(data){
  const risks=[];
  const monthly=data.monthlyBudget||0;
  const daily=monthly/30;
  const chs=data.channels||[];
  const nc=data.numCampaigns||2;
  const totalCampaigns=nc*chs.length;
  const totalAdsets=totalCampaigns*(data.adsetsPerCampaign||3);
  const dailyPerAdset=daily/Math.max(totalAdsets,1);

  if(daily>0&&dailyPerAdset<20) risks.push('Your budget is spread too thin — each adset gets less than $20/day, which limits learning.');
  if(chs.length>2&&monthly<3000) risks.push('You selected too many channels for this budget. Focus on 1–2 channels to get meaningful data.');
  if((data.hotPct||10)>30&&!data.customAudiences) risks.push('Retargeting budget is high but no existing audience is defined. Retargeting needs an audience to work.');
  if((data.creativeAngles||[]).length<3) risks.push('Your creative testing plan lacks angle diversity. Test at least 3 different angles.');
  if(!data.offerProblem||!data.offerPromise) risks.push('Your offer is not clearly defined. Unclear offers lead to poor creative and low conversion rates.');
  if(!(data.trackingChecked||{}).conv_event) risks.push('Your funnel has no verified conversion event. You cannot optimize without it.');
  if(!(data.trackingChecked||{}).pixel_installed) risks.push('Tracking is incomplete — your pixel is not verified. Never launch without verified tracking.');
  if((data.msgHypotheses||[]).filter(h=>h.hook).length<3) risks.push('You have fewer than 3 message hypotheses. More angle testing = faster learning.');
  return risks;
}

/* ── Shared UI ── */
function Field({label,note,hint,required,children}){
  return(<div className="field">
    <label className="label">{label}{required&&<span className="req">*</span>}{note&&<span className="label-note">{note}</span>}</label>
    {children}
    {hint&&<div className="hint">{hint}</div>}
  </div>);
}
function SLabel({children}){return <div className="sec-lbl">{children}</div>;}
function Card({children,style,className=''}){return <div className={`card ${className}`} style={style}>{children}</div>;}
function MCard({label,val,sub,color='c-amber'}){return(<div className={`m-card ${color}`}><div className="m-lbl">{label}</div><div className="m-val">{val}</div>{sub&&<div className="m-sub">{sub}</div>}</div>);}
function Badge({children,type='b-gray',style}){return <span className={`badge ${type}`} style={style}>{children}</span>;}
function Divider(){return <hr className="divider"/>;}

function CopyBtn({text}){
  const [copied,setCopied]=useState(false);
  function copy(){navigator.clipboard?.writeText(text).catch(()=>{});setCopied(true);setTimeout(()=>setCopied(false),1800);}
  return <button className={`copy-btn${copied?' copied':''}`} onClick={copy}>{copied?'✓ Copied':'Copy'}</button>;
}

function PageHeader({eyebrow,title,sub}){
  return(<div className="page-hd">
    <div className="page-eyebrow">{eyebrow}</div>
    <h2 dangerouslySetInnerHTML={{__html:title}}/>
    {sub&&<p>{sub}</p>}

}

function StepNav({onBack,onNext,backLabel='← Previous',nextLabel='Next →',nextDisabled=false,missingItems=[]}){
  return(<div>
    {nextDisabled&&missingItems.length>0&&(
      <div className="missing-panel">
        <div className="missing-title">Required before continuing</div>
        {missingItems.map((m,i)=><div key={i} className="missing-item">{m}</div>)}
      </div>
    )}
    <div className="step-nav">
      <button className="btn-ghost" onClick={onBack}>{backLabel}</button>
      <button className="btn-primary" onClick={onNext} disabled={nextDisabled} style={{opacity: nextDisabled ? 0.5 : 1}}>{nextLabel}</button>
    </div>
  </div>);
}

function RiskPanel({risks}){
  if(!risks||risks.length===0) return null;
  return(<div style={{marginBottom:'1.25rem'}}>
    <div className="sec-lbl">⚠ Risk Diagnosis</div>
    {risks.map((r,i)=><div key={i} className="warn-banner"><span style={{fontSize:'.85rem'}}>⚠</span><span className="warn-text">{r}</span></div>)}
  </div>);
}

const CHANNELS=[
  {id:'Meta',label:'Meta Ads',color:'#1877F2',icon:'📘'},
  {id:'Google',label:'Google Ads',color:'#34A853',icon:'🔍'},
  {id:'TikTok',label:'TikTok Ads',color:'#FF0050',icon:'🎵'},
  {id:'Snapchat',label:'Snapchat',color:'#FFFC00',icon:'👻'},
  {id:'LinkedIn',label:'LinkedIn',color:'#0A66C2',icon:'💼'},
  {id:'Pinterest',label:'Pinterest',color:'#E60023',icon:'📌'},
];

/* ═══════════════════════════════════════
   01 — BRIEF
═══════════════════════════════════════ */
function BriefSheet({data,setData,onNext}){
  const set=(k,v)=>setData(p=>({...p,[k]:v}));
  const goals=['Brand Awareness','Lead Generation','Online Sales','App Installs','Store Traffic','Retargeting','Customer Retention'];
  const kpiOpts=['ROAS','CPA','CPL','CAC','CTR','CVR','Revenue','Conversions','Installs','ACOS','MER','Impressions'];
  const toggleKPI=(k)=>setData(p=>({...p,kpis:p.kpis?.includes(k)?p.kpis.filter(x=>x!==k):[...(p.kpis||[]),k]}));
  const toggleCh=(id)=>setData(p=>({...p,channels:p.channels?.includes(id)?p.channels.filter(x=>x!==id):[...(p.channels||[]),id]}));

  const missing=[];
  if(!data.brand) missing.push('Brand name');
  if(!data.businessGoal||data.businessGoal.length<5) missing.push('Clear business goal');
  if(!(data.channels||[]).length) missing.push('At least one channel');
  const nextDisabled=missing.length>0;

  return(<div>
    <PageHeader eyebrow="Module 01 · Strategy Brief" title="Campaign <em>Brief</em>" sub="Define the strategic foundation. Every module builds on what you set here. Don't skip anything."/>
    <div className="g2">
      <div>
        <Card style={{marginBottom:'1.25rem'}}>
          <SLabel>Brand & Product</SLabel>
          <Field label="Brand Name" required><input value={data.brand||''} onChange={e=>set('brand',e.target.value)} placeholder="e.g. Nike, Airbnb, Spotify"/></Field>
          <Field label="Product / Service" required><input value={data.product||''} onChange={e=>set('product',e.target.value)} placeholder="e.g. Premium sneakers, Project management software, Online courses"/></Field>
          <div className="field-row">
            <Field label="Market / Country"><select value={data.country||'UAE'} onChange={e=>set('country',e.target.value)}>
              {['UAE','KSA','Qatar','Kuwait','Algeria','Morocco','Tunisia','Senegal','Egypt','Jordan','Other'].map(c=><option key={c}>{c}</option>)}
            </select></Field>
            <Field label="Industry"><select value={data.industry||'Ecommerce'} onChange={e=>set('industry',e.target.value)}>
              {['Ecommerce','Fashion','Health','SaaS','Finance','Real Estate','Education','App','Retail','Beauty','Other'].map(i=><option key={i}>{i}</option>)}
            </select></Field>
          </div>
          <div className="field-row">
            <Field label="Funnel / Objective Type"><select value={data.funnelType||'Ecom'} onChange={e=>set('funnelType',e.target.value)}>
              {['Ecom','Lead Gen','App','Brand'].map(f=><option key={f}>{f}</option>)}
            </select></Field>
            <Field label="Campaign Objective"><select value={data.objective||'Conversions'} onChange={e=>set('objective',e.target.value)}>
              {['Conversions','Traffic','App Installs','Lead Generation','Brand Awareness','Video Views','Engagement','Retargeting'].map(o=><option key={o}>{o}</option>)}
            </select></Field>
          </div>
          <Field label="Launch Type" note="What kind of launch is this?"><select value={data.launchType||'New Campaign'} onChange={e=>set('launchType',e.target.value)}>
            {['New Campaign','New Product Launch','New Market Entry','Retargeting Relaunch','App Launch','Lead Gen Push','E-commerce Sale','Seasonal Campaign'].map(t=><option key={t}>{t}</option>)}
          </select></Field>
        </Card>
        <Card>
          <SLabel>Campaign Channels</SLabel>
          <div className="ch-grid" style={{marginBottom:'.85rem'}}>
            {CHANNELS.map(ch=>{
              const on=(data.channels||[]).includes(ch.id);
              return(<button key={ch.id} className={`ch-btn${on?' on':''}`} onClick={()=>toggleCh(ch.id)}>
                <span className="ch-dot" style={{background:ch.color,display:'inline-block'}}/>
                {ch.icon} {ch.label}
              </button>);
            })}
          </div>
        </Card>
      </div>
      <div>
        <Card style={{marginBottom:'1.25rem'}}>
          <SLabel>Strategic Goal</SLabel>
          <Field label="Business Goal" required hint="Be specific. 'Increase sales' is not a goal. '50 conversions at $30 CPA in 30 days' is.">
            <textarea rows="3" value={data.businessGoal||''} onChange={e=>set('businessGoal',e.target.value)} placeholder="e.g. Generate 500 app installs at CPI below $2.50 in the US market within 30 days"/>
          </Field>
          <Field label="Primary Goal Type">
            <div className="tag-grid">
              {goals.map(g=><button key={g} className={`tag-opt${data.primaryGoalType===g?' on':''}`} onClick={()=>set('primaryGoalType',g)}>{g}</button>)}
            </div>
          </Field>
        </Card>
        <Card style={{marginBottom:'1.25rem'}}>
          <SLabel>Key KPIs</SLabel>
          <div className="tag-grid">

function BudgetSheet({data,setData,onNext,onBack}){
  const set=(k,v)=>setData(p=>({...p,[k]:v}));
  const monthly=data.monthlyBudget||5000;
  const days=data.flightDays||(()=>{if(data.startDate&&data.endDate){const d=Math.ceil((new Date(data.endDate)-new Date(data.startDate))/(1000*60*60*24));return d>0?d:30;}return 30;})();
  const total=+(monthly*(days/30)).toFixed(0);
  const daily=+(total/days).toFixed(2);
  const chs=data.channels||['Meta','Google'];
  const chSplits=data.chSplits||Object.fromEntries(chs.map((c)=>[c,Math.round(100/chs.length)]));
  const fuSplit={COLD:data.coldPct||70,WARM:data.warmPct||20,HOT:data.hotPct||10};
  const chSum=Object.values(chSplits).reduce((a,b)=>a+b,0);
  const fuSum=fuSplit.COLD+fuSplit.WARM+fuSplit.HOT;
  const setChSplit=(ch,v)=>setData(p=>({...p,chSplits:{...(p.chSplits||{}),[ch]:v}}));
  const chColors={'Meta':'#1877F2','Google':'#34A853','TikTok':'#FF0050','Snapchat':'#FFFC00','LinkedIn':'#0A66C2','Pinterest':'#E60023'};

  // Sanity checks
  const sanityWarnings=[];
  const nc=data.numCampaigns||2;
  const nas=data.adsetsPerCampaign||3;
  const totalAdsets=nc*chs.length*nas;
  const dailyPerAdset=daily/Math.max(totalAdsets,1);
  if(daily>0&&dailyPerAdset<20) sanityWarnings.push(`Daily budget per adset is ${f$(dailyPerAdset,2)} — too low for meaningful learning. Need at least $20/adset/day.`);
  if(chs.length>2&&monthly<3000) sanityWarnings.push(`$${monthly}/mo across ${chs.length} channels = $${Math.round(monthly/chs.length)}/channel. Consider fewer channels.`);
  if(fuSplit.HOT>30&&!data.customAudiences) sanityWarnings.push(`${fuSplit.HOT}% in retargeting requires a warm audience. Define your custom audiences first.`);
  if(Math.abs(chSum-100)>2&&chs.length>0) sanityWarnings.push(`Channel split totals ${chSum}% — must equal 100%.`);

  const missing=[];
  if(!monthly||monthly<=0) missing.push('Monthly budget');

  return(<div>
    <PageHeader eyebrow="Module 04 · Budget" title="Budget <em>Allocation</em>" sub="Set your total investment and split it across channels and funnel stages. Budget sanity checks run automatically."/>
    {sanityWarnings.length>0&&(<div style={{marginBottom:'1.25rem'}}>
      <div className="sec-lbl">⚠ Budget Sanity Checks</div>
      {sanityWarnings.map((w,i)=><div key={i} className="risk-alert"><span className="risk-icon">⚠</span><span className="risk-text">{w}</span></div>)}
    </div>)}
    <div className="g2">
      <div>
        <Card style={{marginBottom:'1.25rem'}}>
          <SLabel>Total Investment</SLabel>
          <div className="field-row">
            <Field label="Monthly Budget (USD)" required><input type="number" step="100" value={monthly} onChange={e=>set('monthlyBudget',+e.target.value)}/></Field>
            <Field label="Flight Duration (days)"><input type="number" value={days} onChange={e=>set('flightDays',+e.target.value)}/></Field>
          </div>
          <div className="g3" style={{marginTop:'.85rem'}}>
            {[{l:'Total Budget',v:f$(total),c:'c-amber'},{l:'Daily Budget',v:f$(daily,2),c:'c-blue'},{l:'Flight Days',v:days+' days',c:'c-green'}].map(({l,v,c})=><MCard key={l} label={l} val={v} color={c}/>)}
          </div>
        </Card>
        <Card>
          <SLabel>Funnel Split</SLabel>
          <div style={{marginBottom:'.75rem'}}><Badge type={Math.abs(fuSum-100)<1?'b-green':'b-red'}>{Math.abs(fuSum-100)<1?'✓ Valid':'Sum = '+fuSum+'%'}</Badge></div>
          {[{k:'coldPct',l:'Cold / Prospecting',note:'New audiences',def:70},{k:'warmPct',l:'Warm / Engagement',note:'Re-engagement',def:20},{k:'hotPct',l:'Hot / Retargeting',note:'Cart, visitors, past buyers',def:10}].map(({k,l,note,def})=>{
            const v=data[k]||def;
            return(<div key={k} className="sl-row">
              <div className="sl-hdr"><label className="sl-lbl">{l}</label><span className="sl-val">{v}% — {f$(+(daily*v/100).toFixed(2),2)}/day</span></div>
              <div className="sl-sub">{note}</div>
              <input type="range" min="0" max="100" step="1" value={v} onChange={e=>set(k,+e.target.value)}/>
            </div>);
          })}
        </Card>
      </div>
      <div>
        <Card style={{marginBottom:'1.25rem'}}>
          <SLabel>Channel Split</SLabel>
          <div style={{marginBottom:'.75rem'}}><Badge type={Math.abs(chSum-100)<2?'b-green':'b-red'}>{Math.abs(chSum-100)<2?'✓ Valid':'Sum = '+chSum+'%'}</Badge></div>
          {chs.length===0?<p style={{fontSize:'.8rem',color:'var(--ink50)'}}>← Add channels in the Brief tab</p>:chs.map(ch=>{
            const v=chSplits[ch]||Math.round(100/chs.length);
            return(<div key={ch} className="sl-row">
              <div className="sl-hdr"><label className="sl-lbl"><span className="ch-dot" style={{width:8,height:8,borderRadius:'50%',background:chColors[ch]||'#888',display:'inline-block',marginRight:6}}/>{ch}</label><span className="sl-val">{v}% — {f$(+(daily*v/100).toFixed(2),2)}/day</span></div>
              <input type="range" min="0" max="100" step="1" value={v} onChange={e=>setChSplit(ch,+e.target.value)}/>
            </div>);
          })}
        </Card>
        <Card>
          <SLabel>Monthly Channel Breakdown</SLabel>
          {chs.map(ch=>{
            const v=chSplits[ch]||Math.round(100/chs.length);
            return(<div key={ch} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'.55rem 0',borderBottom:'1px solid var(--border)'}}>
              <span style={{display:'flex',alignItems:'center',gap:'.55rem',fontSize:'.82rem'}}><span style={{width:8,height:8,borderRadius:'50%',background:chColors[ch]||'#888',display:'inline-block'}}/>{ch}</span>
              <div style={{textAlign:'right'}}>
                <div style={{fontFamily:'var(--f-d)',fontWeight:900,fontSize:'1.05rem',color:'var(--amber)'}}>{f$(+(monthly*v/100).toFixed(0))}</div>
                <div style={{fontFamily:'var(--f-m)',fontSize:'.62rem',color:'var(--ink50)'}}>{v}% of budget</div>
              </div>
            </div>);
          })}
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'.65rem 0 0',fontWeight:700}}>
            <span style={{fontFamily:'var(--f-m)',fontSize:'.65rem',letterSpacing:'.1em',textTransform:'uppercase',color:'var(--ink50)'}}>Total</span>
            <span style={{fontFamily:'var(--f-d)',fontWeight:900,fontSize:'1.2rem'}}>{f$(monthly)}</span>
          </div>
        </Card>
      </div>
    </div>
    <StepNav onBack={onBack} backLabel="← Audience" onNext={onNext} nextLabel="Benchmarks →" nextDisabled={missing.length>0} missingItems={missing}/>
  </div>);
}

/* ═══════════════════════════════════════
   05 — BENCHMARKS (Planning Assumptions)
═══════════════════════════════════════ */
function BenchmarksSheet({data,setData,onNext,onBack}){
  const set=(k,v)=>setData(p=>({...p,[k]:v}));
  const chs=data.channels||['Meta'];
  const aov=data.aov||100;const gm=data.grossMargin||.40;
  const tCAC=+(aov*gm).toFixed(2);
  const beROAS=gm>0?+(1/gm).toFixed(2):0;
  const monthly=data.monthlyBudget||5000;
  const days=data.flightDays||30;
  const total=+(monthly*(days/30)).toFixed(0);
  const daily=+(total/days).toFixed(2);
  const chSplits=data.chSplits||{};
  const chColors={'Meta':'#1877F2','Google':'#34A853','TikTok':'#FF0050','Snapchat':'#FFFC00','LinkedIn':'#0A66C2','Pinterest':'#E60023'};
  const scenario=data.benchScenario||'base';

  const chProj=chs.map(ch=>{
    const bm=getBM(data.industry||'Ecommerce',data.funnelType||'Ecom',ch);
    const mult=scenario==='conservative'?.6:scenario==='aggressive'?1.4:1;
    const pct=(chSplits[ch]||Math.round(100/chs.length))/100;
    const chDaily=daily*pct;
    const impr=chDaily/(bm.cpm/1000);
    const clicks=impr*bm.ctr*mult;
    const conv=clicks*bm.cvr*mult;
    const rev=conv*aov;
    const cpa=conv>0?chDaily/conv:null;
    const roas=chDaily>0?rev/chDaily:null;
    return{ch,bm,chDaily,impr,clicks,conv,rev,cpa,roas};
  });

  const totConv=chProj.reduce((a,r)=>a+r.conv,0);
  const totRev=chProj.reduce((a,r)=>a+r.rev,0);
  const totROAS=total>0?totRev/total:0;
  const blendedCPA=totConv>0?total/totConv:null;
  const minTestBudget=Math.max(50*chProj.length,200);
  const reqConversions=Math.max(50,Math.round(total/Math.max(tCAC,1)));

  return(<div>
    <PageHeader eyebrow="Module 05 · Planning Assumptions" title="Benchmark <em>Scenarios</em>" sub="These are planning assumptions, not guarantees. Run three scenarios to understand your range of outcomes before committing budget."/>
    <div style={{display:'flex',gap:'.5rem',marginBottom:'1.25rem',flexWrap:'wrap',alignItems:'center'}}>
      <span style={{fontFamily:'var(--f-m)',fontSize:'.65rem',color:'var(--ink50)',letterSpacing:'.1em',textTransform:'uppercase'}}>Scenario:</span>
      {[{id:'conservative',l:'Conservative (-40%)'},{ id:'base',l:'Base Case'},{ id:'aggressive',l:'Aggressive (+40%)'}].map(s=>(
        <button key={s.id} className={`tag-opt${scenario===s.id?' on':''}`} onClick={()=>set('benchScenario',s.id)}>{s.l}</button>
      ))}
    </div>
    <div className="g4" style={{marginBottom:'1.5rem'}}>
      {[
        {l:'Target CAC',v:f$(tCAC,2),c:'c-amber',sub:'Max cost per acquisition'},
        {l:'Break-Even ROAS',v:fx(beROAS),c:'c-blue',sub:'Minimum to cover COGS'},
        {l:'Min. Test Budget',v:f$(minTestBudget),c:'c-green',sub:'For statistical signal'},
        {l:'Required Conv.',v:fn(reqConversions),c:'c-amber',sub:'For early signal'},
        {l:'Est. Conv. / Day',v:fn(Math.round(totConv),1),c:'c-green',sub:'Under this scenario'},
        {l:'Est. Total Rev.',v:f$(totRev*days),c:'c-amber',sub:'Over full flight'},
        {l:'Blended ROAS',v:fx(totROAS),c:totROAS>=beROAS?'c-green':'c-red',sub:'Revenue ÷ Spend'},
        {l:'Blended CPA',v:f$(blendedCPA,2),c:blendedCPA&&blendedCPA<=tCAC?'c-green':'c-red',sub:'Cost per conversion'},
      ].map(({l,v,c,sub})=><MCard key={l} label={l} val={v} sub={sub} color={c}/>)}
    </div>
    <div className="g2" style={{gap:'1.25rem',marginBottom:'1.25rem'}}>
      <Card style={{marginBottom:'1.25rem'}}>
        <SLabel>Unit Economics Inputs</SLabel>
        <div className="field-row">
          <Field label="Average Order Value / LTV ($)"><input type="number" step="10" value={aov} onChange={e=>set('aov',+e.target.value)}/></Field>
          <Field label="Gross Margin %" hint="Revenue - COGS / Revenue"><input type="number" step=".01" min="0" max="1" value={gm} onChange={e=>set('grossMargin',+e.target.value)} placeholder="0.40 = 40%"/></Field>
        </div>
        <div style={{padding:'.85rem',background:'var(--a06)',borderRadius:8,border:'1px solid var(--a12)',marginTop:'.5rem'}}>
          <div style={{fontFamily:'var(--f-m)',fontSize:'.62rem',color:'var(--amber)',letterSpacing:'.1em',textTransform:'uppercase',marginBottom:'.5rem'}}>CAC Range (Conservative → Aggressive)</div>
          <div style={{fontFamily:'var(--f-d)',fontWeight:900,fontSize:'1.2rem',color:'var(--amber)'}}>
            {f$(+(tCAC*.5).toFixed(2),2)} — {f$(+(tCAC*1.5).toFixed(2),2)}
          </div>
          <div style={{fontFamily:'var(--f-m)',fontSize:'.62rem',color:'var(--ink50)',marginTop:'.25rem'}}>Break-even CAC: {f$(tCAC,2)} · Break-even ROAS: {fx(beROAS)}</div>
        </div>
      </Card>
      <Card>
        <SLabel>CAC Range Summary</SLabel>
        {[
          {l:'Conservative CAC',v:f$(+(tCAC*1.5).toFixed(2),2),note:'Worst-case scenario',c:'var(--red)'},
          {l:'Base Case CAC',v:f$(tCAC,2),note:'Expected outcome',c:'var(--amber)'},
          {l:'Aggressive CAC',v:f$(+(tCAC*.7).toFixed(2),2),note:'Best case scenario',c:'var(--green)'},
        ].map(({l,v,note,c})=><div key={l} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'.6rem 0',borderBottom:'1px solid var(--border)'}}>
          <div><div style={{fontSize:'.82rem',fontWeight:700}}>{l}</div><div style={{fontFamily:'var(--f-m)',fontSize:'.62rem',color:'var(--ink30)'}}>{note}</div></div>
          <span style={{fontFamily:'var(--f-d)',fontWeight:900,fontSize:'1.1rem',color:c}}>{v}</span>
        </div>)}
        <div style={{padding:'.75rem 0 0',fontFamily:'var(--f-m)',fontSize:'.72rem',color:'var(--ink50)',lineHeight:1.7}}>
          These ranges are based on {data.industry||'your industry'} benchmarks. Actual performance depends on creative quality, offer strength, landing page, and audience quality.
        </div>
      </Card>
    </div>
    <div className="g2" style={{gap:'1.25rem'}}>
      {chProj.map(({ch,bm,chDaily,impr,clicks,conv,rev,cpa,roas})=>(
        <Card key={ch}>
          <div style={{display:'flex',alignItems:'center',gap:'.65rem',marginBottom:'1rem',paddingBottom:'.85rem',borderBottom:'1px solid var(--border)'}}>
            <span style={{width:10,height:10,borderRadius:'50%',background:chColors[ch]||'#888',display:'inline-block'}}/>

            <Badge type="b-gray" style={{marginLeft:'auto'}}>{f$(chDaily,2)}/day</Badge>
            <Badge type={scenario==='conservative'?'b-red':scenario==='aggressive'?'b-green':'b-amber'}>{scenario}</Badge>
          </div>
          <div className="g2" style={{gap:'.65rem'}}>
            {[{l:'CPM',v:f$(bm.cpm,2)},{l:'CTR',v:fpct(bm.ctr)},{l:'CVR',v:fpct(bm.cvr)},{l:'CPC',v:f$(bm.cpc,2)},{l:'Daily Conv.',v:conv.toFixed(1)},{l:'Daily Rev.',v:f$(rev)},{l:'Est. CPA',v:f$(cpa,2)},{l:'Est. ROAS',v:fx(roas)}].map(({l,v})=>(
              <div key={l} className="card-inner" style={{padding:'.65rem .85rem'}}>
                <div style={{fontFamily:'var(--f-m)',fontSize:'.58rem',letterSpacing:'.1em',textTransform:'uppercase',color:'var(--ink50)',marginBottom:'.3rem'}}>{l}</div>
                <div style={{fontFamily:'var(--f-d)',fontWeight:900,fontSize:'1rem',color:'var(--amber)'}}>{v}</div>
              </div>
            ))}
          </div>
          {cpa&&cpa<=tCAC?<div style={{marginTop:'.85rem'}}><Badge type="b-green">✓ CPA within Target CAC</Badge></div>:cpa?<div style={{marginTop:'.85rem'}}><Badge type="b-red">CPA exceeds Target CAC — review budget or margin</Badge></div>:null}
        </Card>
      ))}
    </div>
    <StepNav onBack={onBack} backLabel="← Budget" onNext={onNext} nextLabel="Structure →"/>
  </div>);
}

/* ═══════════════════════════════════════
   06 — STRUCTURE
═══════════════════════════════════════ */
function StructureSheet({data,setData,onNext,onBack}){
  const set=(k,v)=>setData(p=>({...p,[k]:v}));
  const monthly=data.monthlyBudget||5000;const days=data.flightDays||30;
  const total=+(monthly*(days/30)).toFixed(0);const daily=+(total/days).toFixed(2);
  const chs=data.channels||['Meta'];
  const nc=data.numCampaigns||(daily<150?1:daily<500?2:daily<1500?3:5);
  const nas=data.adsetsPerCampaign||3;const nads=data.adsPerAdset||4;
  const stages=(data.stages||['COLD','WARM','HOT']);
  const stageLabels={'COLD':'Cold','WARM':'Warm','HOT':'Hot'};
  const launchType=data.launchType||'New Campaign';

  const recMap={
    'New Campaign':daily<100?'1 campaign, 2–3 adsets':daily<400?'2–3 campaigns, 3 adsets each':daily<1200?'3–4 campaigns, 3–5 adsets':'4–6 campaigns, full funnel',
    'New Product Launch':'2–3 campaigns: awareness + conversion, 3–4 adsets per campaign',
    'New Market Entry':'1–2 campaigns to start, narrow geo, 2–3 adsets, expand after 2 weeks of data',
    'Retargeting Relaunch':'1 campaign, 3–4 adsets segmented by recency (7d, 30d, 60d)',
    'App Launch':'1–2 campaigns per OS, 2–3 adsets testing interest vs broad, prioritize video formats',
    'Lead Gen Push':'2 campaigns (cold + warm), 3–4 adsets each, test multiple lead magnets',
    'E-commerce Sale':'3 campaigns: COLD awareness, WARM engagement, HOT cart recovery',
    'Seasonal Campaign':'2 campaigns: early bird + main push, 3 adsets testing angles',
  };

  const recCampaigns=recMap[launchType]||recMap['New Campaign'];
  const dailyPerAdset=daily/Math.max(nc*chs.length*(nas||1),1);
  const structureWarning=dailyPerAdset<20?`Each adset gets ${f$(dailyPerAdset,2)}/day — below minimum learning threshold`:null;

  return(<div>
    <PageHeader eyebrow="Module 06 · Structure" title="Campaign <em>Architecture</em>" sub="Set the number of campaigns, adsets and ads. The naming convention in the next step is built from this exact structure."/>
    {structureWarning&&<div className="risk-alert" style={{marginBottom:'1.25rem'}}><span className="risk-icon">⚠</span><span className="risk-text">{structureWarning}</span></div>}
    <div style={{background:'var(--a06)',border:'1px solid var(--a20)',borderRadius:8,padding:'1rem 1.1rem',marginBottom:'1.25rem'}}>
      <div style={{fontFamily:'var(--f-m)',fontSize:'.62rem',letterSpacing:'.12em',textTransform:'uppercase',color:'var(--amber)',marginBottom:'.35rem'}}>Recommended for {launchType}</div>
      <div style={{fontSize:'.82rem',color:'var(--ink70)',lineHeight:1.75}}>{recCampaigns}</div>
    </div>
    <div className="g2">
      <div>
        <Card style={{marginBottom:'1.25rem'}}>
          <SLabel>Structure Inputs</SLabel>
          <div className="field-row">
            <Field label="Campaigns per Channel"><input type="number" min="1" max="10" value={nc} onChange={e=>set('numCampaigns',+e.target.value)}/></Field>
            <Field label="Adsets per Campaign"><input type="number" min="1" max="10" value={nas} onChange={e=>set('adsetsPerCampaign',+e.target.value)}/></Field>
          </div>
          <div className="field-row">
            <Field label="Ads per Adset"><input type="number" min="1" max="10" value={nads} onChange={e=>set('adsPerAdset',+e.target.value)}/></Field>
            <Field label="Total Channels"><div style={{fontFamily:'var(--f-d)',fontWeight:900,fontSize:'1.5rem',color:'var(--amber)',marginTop:'.35rem'}}>{chs.length}</div></Field>
          </div>
          <Divider/>
          <div className="g4" style={{gap:'.65rem'}}>
            {[{l:'Total Campaigns',v:nc*chs.length},{l:'Total Adsets',v:nc*chs.length*nas},{l:'Total Ads',v:nc*chs.length*nas*nads},{l:'Min. Creatives',v:nc*chs.length*nas*nads}].map(({l,v})=><div key={l} className="card-inner" style={{textAlign:'center',padding:'.75rem .85rem'}}>
              <div style={{fontFamily:'var(--f-m)',fontSize:'.58rem',letterSpacing:'.1em',textTransform:'uppercase',color:'var(--ink50)',marginBottom:'.3rem'}}>{l}</div>
              <div style={{fontFamily:'var(--f-d)',fontWeight:900,fontSize:'1.4rem',color:'var(--amber)'}}>{v}</div>
            </div>)}
          </div>
        </Card>
        <Card>
          <SLabel>Budget per Unit</SLabel>
          {[{l:'Per Channel (daily)',v:f$(+(daily/chs.length).toFixed(2),2)},{l:'Per Campaign (daily)',v:f$(+(daily/chs.length/nc).toFixed(2),2)},{l:'Per Adset (daily)',v:f$(+(daily/chs.length/nc/nas).toFixed(2),2),warn:dailyPerAdset<20}].map(({l,v,warn})=>(
            <div key={l} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'.6rem 0',borderBottom:'1px solid var(--border)'}}>
              <span style={{fontSize:'.82rem',color:'var(--ink70)'}}>{l}</span>
              <span style={{fontFamily:'var(--f-d)',fontWeight:700,fontSize:'.95rem',color:warn?'var(--red)':'var(--amber)'}}>{v}{warn?' ⚠':''}</span>
            </div>
          ))}
        </Card>
      </div>
      <div>
        <Card>
          <SLabel>Structure Preview</SLabel>
          <p style={{fontSize:'.75rem',color:'var(--ink50)',marginBottom:'1rem',lineHeight:1.7}}>Showing first channel ({chs[0]||'Meta'}) · {nc} campaign{nc>1?'s':''} · {nas} adsets · {nads} ads</p>
          {Array.from({length:Math.min(nc,3)}).map((_,ci)=>{
            const stage=stages[ci%stages.length];
            return(<div key={ci} className="tree-campaign">
              <div className="tree-c-hdr">
                <span className="tree-c-icon">📁</span>
                <span className="tree-c-name">[{chs[0]||'Meta'}] [{stageLabels[stage]||stage}] Campaign {ci+1}</span>
                <Badge type="b-amber">{f$(+(daily/chs.length/nc).toFixed(2),2)}/day</Badge>
              </div>
              {Array.from({length:Math.min(nas,3)}).map((_,ai)=>(
                <div key={ai} className="tree-adset">
                  <span style={{color:'var(--ink30)',fontSize:'.7rem',marginRight:'.25rem'}}>└</span>
                  <div style={{flex:1}}>
                    <div className="tree-a-name">Adset {ai+1} — Audience Segment {ai+1}</div>
                    <div className="tree-ads">
                      {Array.from({length:Math.min(nads,3)}).map((_,adi)=>(
                        <div key={adi} className="tree-ad">Ad {adi+1} · Creative variant</div>
                      ))}
                      {nads>3&&<div className="tree-ad" style={{color:'var(--ink30)'}}>+{nads-3} more ads…</div>}
                    </div>
                  </div>
                </div>
              ))}
              {nas>3&&<div style={{padding:'.45rem 1.1rem .45rem 2.5rem',fontSize:'.72rem',color:'var(--ink30)',fontFamily:'var(--f-m)'}}>+{nas-3} more adsets…</div>}
            </div>);
          })}
          {nc>3&&<p style={{fontSize:'.72rem',color:'var(--ink30)',fontFamily:'var(--f-m)',textAlign:'center',padding:'.5rem'}}>+{nc-3} more campaigns not shown</p>}
        </Card>
      </div>
    </div>
    <StepNav onBack={onBack} backLabel="← Benchmarks" onNext={onNext} nextLabel="Naming →"/>
  </div>);
}

/* ═══════════════════════════════════════
   07 — NAMING CONVENTION
═══════════════════════════════════════ */
const ALL_TOKENS=[
  {id:'BRAND',label:'Brand',example:d=>upper(d.brand||'BRAND').slice(0,8)},
  {id:'COUNTRY',label:'Country',example:d=>upper(d.country||'UAE').slice(0,3)},
  {id:'CHANNEL',label:'Channel',example:_=>'META'},
  {id:'OBJECTIVE',label:'Objective',example:d=>upper(d.objective||'CONV').slice(0,6)},
  {id:'FUNNEL',label:'Funnel Stage',example:_=>'COLD'},
  {id:'AUDIENCE',label:'Audience',example:_=>'INT'},
  {id:'FORMAT',label:'Ad Format',example:_=>'VID'},
  {id:'ANGLE',label:'Creative Angle',example:_=>'PAIN'},
  {id:'AGE',label:'Age Range',example:d=>`${d.ageMin||18}-${d.ageMax||45}`},
  {id:'GENDER',label:'Gender',example:d=>d.gender==='All'?'ALL':d.gender==='Male'?'M':'F'},
  {id:'DATE',label:'Date',example:_=>{const d=new Date();return`${d.getFullYear()}Q${Math.ceil((d.getMonth()+1)/3)}`;}},
  {id:'VERSION',label:'Version',example:_=>'V1'},
  {id:'PLACEMENT',label:'Placement',example:_=>'FEED'},
];

function NamingSheet({data,setData,onNext,onBack}){
  const set=(k,v)=>setData(p=>({...p,[k]:v}));
  const cToks=data.campTokens||['BRAND','COUNTRY','CHANNEL','OBJECTIVE','FUNNEL','DATE'];
  const aToks=data.adsetTokens||['FUNNEL','AUDIENCE','AGE','GENDER'];
  const adToks=data.adTokens||['FORMAT','ANGLE','VERSION'];
  const sep=data.separator||'_';
  const chs=data.channels||['Meta'];
  const stages=data.stages||['COLD','WARM','HOT'];
  const nc=data.numCampaigns||2;const nas=data.adsetsPerCampaign||3;const nads=data.adsPerAdset||4;

  function buildName(toks,overrides={}){
    return toks.map(tid=>{
      const tok=ALL_TOKENS.find(t=>t.id===tid);
      return overrides[tid]||tok?.example(data)||tid;
    }).join(sep);
  }
  function toggleTok(key,tid){
    setData(p=>{const arr=p[key]||[];return{...p,[key]:arr.includes(tid)?arr.filter(x=>x!==tid):[...arr,tid]};});
  }
  const campPreview=buildName(cToks,{CHANNEL:'META',FUNNEL:'COLD'});
  const adsetPreview=buildName(aToks,{FUNNEL:'COLD',AUDIENCE:'INT25-45'});
  const adPreview=buildName(adToks,{FORMAT:'VID',ANGLE:'PAIN',VERSION:'V1'});
  const audiences=['INT25-45','LAL180D','RETGT-CART','RETGT-VIEW','CRM-LIST','INT18-34-F','BROAD'];
  const formats=['VID','STATIC','UGC','CAROUSEL','REEL','STORY'];
  const angles=['PAIN','OFFER','SOCIAL','COMP','FEAT','BENE','UGCR'];
  const exampleNames=[];
  chs.slice(0,2).forEach(ch=>{
    stages.slice(0,2).forEach(stage=>{
      exampleNames.push({level:'Campaign',ch,stage,name:buildName(cToks,{CHANNEL:upper(ch),FUNNEL:stage,BRAND:upper(data.brand||'BRAND').slice(0,8),COUNTRY:upper(data.country||'UAE').slice(0,3),OBJECTIVE:upper(data.objective||'CONV').slice(0,6),DATE:'2025Q2'})});
      audiences.slice(0,2).forEach(aud=>{
        exampleNames.push({level:'Adset',ch,stage,aud,name:buildName(aToks,{FUNNEL:stage,AUDIENCE:aud,AGE:`${data.ageMin||18}-${data.ageMax||45}`,GENDER:data.gender==='Male'?'M':data.gender==='Female'?'F':'ALL'})});
        formats.slice(0,1).forEach(fmt=>{
          angles.slice(0,1).forEach((ang,vi)=>{
            exampleNames.push({level:'Ad',name:buildName(adToks,{FORMAT:fmt,ANGLE:ang,VERSION:`V${vi+1}`,PLACEMENT:'FEED'})});
          });
        });
      });
    });
  });

  return(<div>
    <PageHeader eyebrow="Module 07 · Naming Convention" title="Naming <em>Convention</em>" sub="Select token fields and order to auto-generate consistent names for every campaign, adset and ad."/>
    <div className="g2" style={{marginBottom:'1.25rem'}}>
      <Card>
        <SLabel>Convention Builder</SLabel>
        <div className="field" style={{marginBottom:'.85rem'}}>
          <label className="label">Separator</label>
          <div style={{display:'flex',gap:'.4rem'}}>
            {['_','-','|','/'].map(s=><button key={s} className={`tag-opt${sep===s?' on':''}`} onClick={()=>set('separator',s)} style={{padding:'.25rem .75rem',fontFamily:'var(--f-m)'}}>{s}</button>)}
          </div>
        </div>
        {[
          {key:'campTokens',label:'Campaign Name Tokens',toks:cToks,preview:campPreview},
          {key:'adsetTokens',label:'Adset Name Tokens',toks:aToks,preview:adsetPreview},
          {key:'adTokens',label:'Ad Name Tokens',toks:adToks,preview:adPreview},
        ].map(({key,label,toks,preview})=>(
          <div key={key} style={{marginBottom:'1.1rem'}}>
            <label className="label">{label}</label>
            <div className="token-rail">
              {ALL_TOKENS.map(tok=><button key={tok.id} className={`token${toks.includes(tok.id)?' on':''}`} onClick={()=>toggleTok(key,tok.id)}>{toks.includes(tok.id)?<span className="token-drag">✦</span>:null}{tok.label}</button>)}
            </div>
            <div className="preview-box">{preview||'—'}<CopyBtn text={preview}/></div>
          </div>
        ))}
      </Card>
      <div>
        <Card>
          <SLabel>Generated Name Examples</SLabel>
          <p style={{fontSize:'.75rem',color:'var(--ink50)',marginBottom:'1rem',lineHeight:1.7}}>Auto-generated from your campaign structure. All {nc*chs.length} campaigns × {nas} adsets × {nads} ads follow this pattern.</p>
          {exampleNames.map((n,i)=>(
            <div key={i} className="name-row">
              <span className="name-level" style={{color:n.level==='Campaign'?'var(--amber)':n.level==='Adset'?'var(--blue)':'var(--ink30)',paddingLeft:n.level==='Adset'?'0.75rem':n.level==='Ad'?'1.5rem':'0'}}>{n.level}</span>
              <span className="name-str">{n.name}</span>
              <CopyBtn text={n.name}/>
            </div>
          ))}
        </Card>
      </div>
    </div>
    <StepNav onBack={onBack} backLabel="← Structure" onNext={onNext} nextLabel="Creative →"/>
  </div>);
}

/* ═══════════════════════════════════════
   08 — CREATIVE & MESSAGE HYPOTHESES
═══════════════════════════════════════ */
function CreativeSheet({data,setData,onNext,onBack}){
  const set=(k,v)=>setData(p=>({...p,[k]:v}));
  const chs=data.channels||['Meta'];
  const nc=data.numCampaigns||2;const nas=data.adsetsPerCampaign||3;const nads=data.adsPerAdset||4;
  const totalAds=nc*chs.length*nas*nads;
  const formats=data.creativeFormats||['Video (15s)','Static Image'];
  const angles=data.creativeAngles||['Pain Point','Offer','Social Proof'];
  const toggleFmt=(f)=>setData(p=>({...p,creativeFormats:(p.creativeFormats||[]).includes(f)?(p.creativeFormats||[]).filter(x=>x!==f):[...(p.creativeFormats||[]),f]}));
  const toggleAngle=(a)=>setData(p=>({...p,creativeAngles:(p.creativeAngles||[]).includes(a)?(p.creativeAngles||[]).filter(x=>x!==a):[...(p.creativeAngles||[]),a]}));
  const allFormats=['Video (15s)','Video (30s+)','Static Image','UGC','Carousel','Reel / Short-form','Story','Collection'];
  const allAngles=['Pain Point','Offer / Discount','Social Proof','Comparison','Features','Benefits','Testimonial','Before/After','How-it-works','Urgency / FOMO','Celebrity / Creator','Education'];
  const specsByFormat={
    'Video (15s)':{ratio:'9:16, 4:5, 1:1',duration:'≤ 15s',size:'<250MB',formats:'MP4, MOV'},
    'Video (30s+)':{ratio:'9:16, 16:9, 4:5',duration:'16s–60s',size:'<250MB',formats:'MP4, MOV'},
    'Static Image':{ratio:'1:1, 4:5, 9:16',size:'<30MB',formats:'JPG, PNG',res:'1080×1080 min'},
    'UGC':{ratio:'9:16',duration:'15–60s',style:'Raw, authentic feel',hook:'First 3 seconds critical'},
    'Carousel':{ratio:'1:1',cards:'2–10 cards',size:'<30MB/card',formats:'JPG, PNG, MP4'},
    'Reel / Short-form':{ratio:'9:16',duration:'7–90s',size:'<250MB',formats:'MP4, MOV'},
    'Story':{ratio:'9:16',safe_zone:'Top & bottom 14%',duration:'≤ 15s',formats:'JPG, PNG, MP4'},
    'Collection':{ratio:'1:1',note:'Requires catalogue',cta:'Shop Now / View Collection',formats:'JPG, PNG'},
  };

  // Message hypotheses
  const hypTypes=['Pain-based','Benefit-based','Social Proof','Urgency / FOMO','Comparison'];
  const hyps=data.msgHypotheses||hypTypes.map(t=>({type:t,angle:'',hook:'',promise:'',risk:'Medium'}));
  function updateHyp(i,k,v){
    const arr=[...(data.msgHypotheses||hyps)];
    arr[i]={...arr[i],[k]:v};
    set('msgHypotheses',arr);
  }

  const filledHyps=(data.msgHypotheses||hyps).filter(h=>h.hook&&h.hook.length>3).length;

  const missing=[];
  if(formats.length<1) missing.push('At least one creative format');
  if(angles.length<2) missing.push('At least 2 creative angles');

  return(<div>
    <PageHeader eyebrow="Module 08 · Creative Brief" title="Creative <em>Strategy</em>" sub="Define formats, angles, and message hypotheses. A minimum of 3 message hypotheses required for meaningful testing."/>
    <div className="g2" style={{marginBottom:'1.25rem'}}>
      <div>
        <Card style={{marginBottom:'1.25rem'}}>
          <SLabel>Ad Formats</SLabel>
          <div className="tag-grid">{allFormats.map(f=><button key={f} className={`tag-opt${formats.includes(f)?' on':''}`} onClick={()=>toggleFmt(f)}>{f}</button>)}</div>
        </Card>
        <Card style={{marginBottom:'1.25rem'}}>
          <SLabel>Creative Angles / Messaging Pillars</SLabel>
          <div style={{marginBottom:'.6rem'}}><Badge type={angles.length>=3?'b-green':angles.length>=2?'b-amber':'b-red'}>{angles.length} angles selected {angles.length<3?'— need at least 3':''}</Badge></div>
          <div className="tag-grid">{allAngles.map(a=><button key={a} className={`tag-opt${angles.includes(a)?' on':''}`} onClick={()=>toggleAngle(a)}>{a}</button>)}</div>
        </Card>
        <Card>
          <SLabel>CTA & Copy Direction</SLabel>
          <Field label="Primary CTA"><select value={data.cta||'Shop Now'} onChange={e=>set('cta',e.target.value)}>
            {['Shop Now','Learn More','Sign Up','Get Started','Book Now','Download','Contact Us','Get Quote','Apply Now','Subscribe'].map(c=><option key={c}>{c}</option>)}
          </select></Field>
          <Field label="Key Message / USP" hint="What's the single most compelling thing?"><textarea value={data.usp||''} onChange={e=>set('usp',e.target.value)} placeholder="What's the single most compelling thing about this product/offer?"/></Field>
          <Field label="Offer / Promotion" note="if any"><input value={data.offer||''} onChange={e=>set('offer',e.target.value)} placeholder="e.g. 30% off annual plan, Free trial — no credit card, Limited beta spots"/></Field>
          <Field label="Do Not Do / Brand Guardrails"><textarea value={data.dontDo||''} onChange={e=>set('dontDo',e.target.value)} style={{minHeight:56}} placeholder="e.g. No celebrity endorsements, avoid direct comparisons, always show the product in use…"/></Field>
        </Card>
      </div>
      <div>
        <Card style={{marginBottom:'1.25rem'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'.85rem'}}>
            <div className="sec-lbl" style={{margin:0}}>Message Hypotheses</div>
            <Badge type={filledHyps>=3?'b-green':filledHyps>=2?'b-amber':'b-red'}>{filledHyps}/5 defined</Badge>
          </div>
          <p style={{fontSize:'.75rem',color:'var(--ink50)',marginBottom:'1rem',lineHeight:1.7}}>Define the message angle and hook for each hypothesis. At least 3 must be completed before launching.</p>
          {(data.msgHypotheses||hyps).map((h,i)=>(
            <div key={i} className="hyp-card">
              <div className="hyp-type">{h.type||hypTypes[i]||`Hypothesis ${i+1}`}</div>
              <div className="field-row" style={{marginBottom:'.6rem'}}>
                <Field label="Hook / Opener">
                  <input value={h.hook||''} onChange={e=>updateHyp(i,'hook',e.target.value)} placeholder="First line that stops the scroll…"/>
                </Field>
                <Field label="Core Promise">
                  <input value={h.promise||''} onChange={e=>updateHyp(i,'promise',e.target.value)} placeholder="What you're promising to the audience…"/>
                </Field>
              </div>
              <div className="field-row">

function TrackingSheet({data,setData,onNext,onBack}){
  const set=(k,v)=>setData(p=>({...p,[k]:v}));

  const brand=slug(data.brand||'brand');const campaign=slug(data.businessGoal||'campaign').slice(0,20);
  const url=data.landingPage||'https://yoursite.com/page';

  function buildUTM(ch,med){
    const params=[
      ['utm_source',ch.toLowerCase()],['utm_medium',med||'paid'],
      ['utm_campaign',data.utmCampaign||campaign],['utm_content','{{ad.name}}'],['utm_term','{{adset.name}}'],
    ];
    return url+'?'+params.map(([k,v])=>`${k}=${encodeURIComponent(v)}`).join('&');

    {id:'test_events',title:'Test events verified in platform',desc:'Meta Events Manager → Test Events · Google Tag Assistant → Tag fired',critical:true},
    {id:'gtm_live',title:'Google Tag Manager published',desc:'Workspace changes published and live on the production site',critical:false},
    {id:'ga4_linked',title:'GA4 linked to ad platform',desc:'Google Ads ↔ GA4 linked · Meta ↔ GA4 via native integration',critical:false},
    {id:'meta_pixel',title:'Meta Pixel deduplication active (CAPI)',desc:'Server-side events configured to prevent duplicate conversion signals',critical:false},
    {id:'utm_consistent',title:'UTM structure consistent across all ads',desc:'All ad URLs use the same UTM convention — no manual typos',critical:true},
    {id:'url_params_test',title:'URL parameters verified on landing page',desc:'Visited the UTM URL — params appear in GA4 → Reports → Acquisition',critical:false},
    {id:'dashboard_ready',title:'Reporting dashboard / template ready',desc:'Reports set up in GA4, Looker Studio, or ad platform before launch',critical:false},
    {id:'test_conversion',title:'Test conversion completed end-to-end',desc:'Simulated the entire user journey from ad click → thank-you page',critical:true},
  ];

  const [checked,setChecked]=useState(data.trackingChecked||{});
  function toggle(id){const n={...checked,[id]:!checked[id]};setChecked(n);set('trackingChecked',n);}
  const done=Object.values(checked).filter(Boolean).length;
  const criticalMissing=trackingItems.filter(i=>i.critical&&!checked[i.id]);

  const missing=[];

  return(<div>
    <PageHeader eyebrow="Module 09 · Tracking" title="Tracking & <em>UTMs</em>" sub="Nothing launches without verified tracking. Critical items are blockers — they prevent the Go decision."/>
    {criticalMissing.length>0&&<div className="risk-alert" style={{marginBottom:'1.25rem'}}><span className="risk-icon">🚨</span><span className="risk-text">Critical tracking items missing: {criticalMissing.map(i=>i.title).join(' · ')}</span></div>}
    <div className="g2">
      <div>
        <Card style={{marginBottom:'1.25rem'}}>
          <SLabel>UTM Settings</SLabel>
          <Field label="Landing Page URL" required><input value={data.landingPage||''} onChange={e=>set('landingPage',e.target.value)} placeholder="https://yoursite.com/landing-page"/></Field>
          <Field label="Campaign Slug"><input value={data.utmCampaign||campaign} onChange={e=>set('utmCampaign',e.target.value)}/></Field>
        </Card>
        <Card>
          <SLabel>Generated UTM Links</SLabel>
          {chs.map(ch=>(
            <div key={ch} style={{marginBottom:'1rem'}}>
              <div style={{fontFamily:'var(--f-m)',fontSize:'.65rem',letterSpacing:'.1em',textTransform:'uppercase',color:'var(--ink50)',marginBottom:'.4rem'}}>{ch}</div>
              <div className="utm-box" style={{fontSize:'.72rem'}}>
                <span className="utm-param">utm_source</span>=<span className="utm-val">{ch.toLowerCase()}</span>&nbsp;
                <span className="utm-param">utm_medium</span>=<span className="utm-val">{chMedium[ch]||'paid'}</span>&nbsp;
                <span className="utm-param">utm_campaign</span>=<span className="utm-val">{data.utmCampaign||campaign}</span>&nbsp;
                <span className="utm-param">utm_content</span>=<span className="utm-val">&#123;&#123;ad.name&#125;&#125;</span>&nbsp;
                <span className="utm-param">utm_term</span>=<span className="utm-val">&#123;&#123;adset.name&#125;&#125;</span>
              </div>
              <div style={{marginTop:'.4rem',display:'flex',justifyContent:'flex-end'}}><CopyBtn text={buildUTM(ch,chMedium[ch])}/></div>
            </div>
          ))}

      </div>
      <Card>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'1rem'}}>
          <div className="sec-lbl" style={{margin:0}}>Tracking Checklist</div>

        </div>
        {trackingItems.map(item=>(
          <div key={item.id} className={`check-item${checked[item.id]?' done':''}`} onClick={()=>toggle(item.id)}>

      </Card>

    <StepNav onBack={onBack} backLabel="← Creative" onNext={onNext} nextLabel="Checklist →" nextDisabled={!data.landingPage} missingItems={missing}/>
  </div>);
}

/* ═══════════════════════════════════════
