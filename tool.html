<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Raqmetrics — Pre-Launch Campaign Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Merriweather:wght@300;400;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
:root{
  --bg:#ffffff;--bg2:#f7f6f3;--bg3:#f0ede8;--bg4:#e8e4dd;
  --ink:#111110;--ink70:rgba(17,17,16,.7);--ink50:rgba(17,17,16,.5);--ink30:rgba(17,17,16,.3);--ink10:rgba(17,17,16,.1);--ink05:rgba(17,17,16,.05);
  --amber:#F25C05;--amber-h:#D94E00;--amber-l:#FFF0E6;
  --a30:rgba(242,92,5,.3);--a20:rgba(242,92,5,.2);--a12:rgba(242,92,5,.12);--a06:rgba(242,92,5,.06);
  --border:#e3e1dc;--border2:#d4d0c8;
  --card:#ffffff;--shadow:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.04);--shadow-lg:0 8px 40px rgba(0,0,0,.09);
  --green:#1a7a3c;--green-l:rgba(26,122,60,.1);--green-b:rgba(26,122,60,.2);
  --red:#c0392b;--red-l:rgba(192,57,43,.08);--red-b:rgba(192,57,43,.18);
  --blue:#1e4db7;--blue-l:rgba(30,77,183,.08);--blue-b:rgba(30,77,183,.18);
  --f-d:'Playfair Display',Georgia,serif;
  --f-b:'Merriweather',Georgia,serif;
  --f-m:'DM Mono',monospace;
  --r:10px;--t:.2s;--ease:cubic-bezier(.4,0,.2,1);
}
[data-theme="dark"]{
  --bg:#0e0d0c;--bg2:#161512;--bg3:#1e1c18;--bg4:#252320;
  --ink:#f0ede8;--ink70:rgba(240,237,232,.7);--ink50:rgba(240,237,232,.5);--ink30:rgba(240,237,232,.3);--ink10:rgba(240,237,232,.1);--ink05:rgba(240,237,232,.05);
  --border:#2a2722;--border2:#363028;--card:#1a1815;
  --shadow:0 1px 3px rgba(0,0,0,.3),0 4px 16px rgba(0,0,0,.2);--shadow-lg:0 8px 40px rgba(0,0,0,.4);
  --amber-l:rgba(242,92,5,.15);--green-l:rgba(26,122,60,.15);--red-l:rgba(192,57,43,.12);--blue-l:rgba(30,77,183,.12);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--ink);font-family:var(--f-b);line-height:1.7;-webkit-font-smoothing:antialiased;overflow-x:hidden;transition:background .3s,color .3s;min-height:100vh}
a{text-decoration:none;color:inherit}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select,textarea{font-family:var(--f-m);font-size:.8rem;color:var(--ink);background:var(--bg2);border:1.5px solid var(--border);border-radius:7px;padding:.5rem .75rem;outline:none;transition:border-color var(--t),background var(--t);width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--amber);background:var(--bg)}
input[type=checkbox]{width:auto;accent-color:var(--amber)}
input[type=range]{padding:0;border:none;background:none;accent-color:var(--amber)}
select option{background:var(--bg2)}
textarea{resize:vertical;min-height:72px;line-height:1.6}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
:focus-visible{outline:2px solid var(--amber);outline-offset:2px;border-radius:4px}

/* ── NAV ── */
.nav{position:fixed;top:0;left:0;right:0;z-index:900;padding:.9rem 0;background:rgba(255,255,255,.92);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid var(--border);transition:background .3s}
[data-theme=dark] .nav{background:rgba(14,13,12,.92)}
.nav-i{display:flex;align-items:center;justify-content:space-between;max-width:1320px;margin:0 auto;padding:0 clamp(1rem,3vw,2rem)}
.logo{font-family:var(--f-d);font-size:1.2rem;font-weight:900;letter-spacing:-.04em}
.logo span{color:var(--amber)}
.nav-right{display:flex;align-items:center;gap:.6rem}
.theme-btn{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--ink50);transition:all var(--t)}
.theme-btn:hover{border-color:var(--amber);color:var(--amber)}
.back-btn{font-family:var(--f-m);font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;padding:.35rem .85rem;border-radius:999px;border:1.5px solid var(--border);color:var(--ink50);transition:all var(--t);background:none}
.back-btn:hover{border-color:var(--ink);color:var(--ink)}
.avail{display:flex;align-items:center;gap:.4rem;font-family:var(--f-m);font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--amber);background:var(--a12);border:1px solid var(--a30);padding:.25rem .7rem;border-radius:999px}
.avail-dot{width:5px;height:5px;border-radius:50%;background:var(--amber);animation:pulse 1.8s ease infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.6)}}

/* ── LAYOUT ── */
.shell{display:flex;min-height:100vh;padding-top:57px}
.sidebar{width:240px;flex-shrink:0;position:fixed;top:57px;left:0;bottom:0;overflow-y:auto;border-right:1px solid var(--border);background:var(--bg2);padding:1.5rem 0;z-index:800}
.sidebar::-webkit-scrollbar{width:0}
.main{flex:1;margin-left:240px;padding:2rem clamp(1rem,3vw,2.5rem);max-width:calc(1320px - 240px);min-height:calc(100vh - 57px)}
@media(max-width:900px){.sidebar{display:none}.main{margin-left:0}}

/* ── SIDEBAR NAV ── */
.sb-section{font-family:var(--f-m);font-size:.55rem;letter-spacing:.2em;text-transform:uppercase;color:var(--ink30);padding:.65rem 1.4rem .35rem;margin-top:.5rem}
.sb-btn{display:flex;align-items:center;gap:.7rem;width:100%;padding:.6rem 1.4rem;font-family:var(--f-m);font-size:.72rem;letter-spacing:.04em;color:var(--ink50);transition:all var(--t);position:relative;text-align:left;background:none;border:none;cursor:pointer}
.sb-btn:hover{color:var(--ink);background:var(--ink05)}
.sb-btn.on{color:var(--amber);background:var(--a06)}
.sb-btn.on::before{content:'';position:absolute;left:0;top:4px;bottom:4px;width:2.5px;background:var(--amber);border-radius:0 2px 2px 0}
.sb-num{font-family:var(--f-m);font-size:.58rem;width:20px;height:20px;border-radius:5px;background:var(--ink10);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all var(--t);color:var(--ink30)}
.sb-btn.on .sb-num{background:var(--a12);color:var(--amber)}
.sb-btn.done .sb-num{background:var(--green-l);color:var(--green)}
.sb-check{margin-left:auto;font-size:.7rem;color:var(--green);opacity:0;transition:opacity var(--t)}
.sb-btn.done .sb-check{opacity:1}
.sb-progress{padding:1.4rem;border-top:1px solid var(--border);margin-top:auto}
.sb-prog-label{display:flex;justify-content:space-between;font-family:var(--f-m);font-size:.62rem;color:var(--ink50);margin-bottom:.45rem}
.prog-track{height:3px;background:var(--ink10);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--amber-h),var(--amber));border-radius:2px;transition:width .4s var(--ease)}

/* ── PAGE HEADER ── */
.page-hd{margin-bottom:1.75rem;padding-bottom:1.25rem;border-bottom:1px solid var(--border)}
.page-eyebrow{display:inline-flex;align-items:center;gap:.45rem;font-family:var(--f-m);font-size:.6rem;letter-spacing:.16em;text-transform:uppercase;color:var(--amber);background:var(--a06);border:1px solid var(--a20);padding:.22rem .75rem;border-radius:999px;margin-bottom:.75rem}
.page-hd h2{font-family:var(--f-d);font-size:clamp(1.4rem,2.5vw,1.9rem);font-weight:900;letter-spacing:-.04em;line-height:1.1;margin-bottom:.35rem}
.page-hd h2 em{color:var(--amber);font-style:italic}
.page-hd p{font-size:.82rem;color:var(--ink50);line-height:1.85;max-width:580px}

/* ── CARDS ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:1.4rem;box-shadow:var(--shadow)}
.card-inner{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:1rem 1.1rem}
.card-accent{border-left:3px solid var(--amber)}

/* ── GRID ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem}
@media(max-width:1100px){.g4{grid-template-columns:1fr 1fr}}
@media(max-width:750px){.g2,.g3{grid-template-columns:1fr}}

/* ── FORM ── */
.field{margin-bottom:1.1rem}
.field:last-child{margin-bottom:0}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
@media(max-width:640px){.field-row{grid-template-columns:1fr}}
.label{display:block;font-family:var(--f-m);font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;color:var(--ink50);margin-bottom:.4rem}
.label-note{font-size:.6rem;color:var(--ink30);margin-left:.4rem;text-transform:none;letter-spacing:0}
.hint{font-family:var(--f-m);font-size:.62rem;color:var(--ink30);margin-top:.3rem}

/* ── SECTION LABEL ── */
.sec-lbl{font-family:var(--f-m);font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;color:var(--ink30);margin-bottom:.85rem;display:flex;align-items:center;gap:.55rem}
.sec-lbl::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── BADGE ── */
.badge{display:inline-flex;align-items:center;padding:.18rem .65rem;border-radius:999px;font-family:var(--f-m);font-size:.6rem;letter-spacing:.06em;white-space:nowrap;gap:.3rem}
.b-amber{background:var(--a12);color:var(--amber);border:1px solid var(--a20)}
.b-green{background:var(--green-l);color:var(--green);border:1px solid var(--green-b)}
.b-red{background:var(--red-l);color:var(--red);border:1px solid var(--red-b)}
.b-blue{background:var(--blue-l);color:var(--blue);border:1px solid var(--blue-b)}
.b-gray{background:var(--ink05);color:var(--ink50);border:1px solid var(--border)}

/* ── METRIC CARD ── */
.m-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:1.1rem 1.25rem;box-shadow:var(--shadow);position:relative;overflow:hidden}
.m-card::after{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.m-card.c-amber::after{background:var(--amber)}.m-card.c-green::after{background:var(--green)}
.m-card.c-blue::after{background:var(--blue)}.m-card.c-red::after{background:var(--red)}
.m-lbl{font-family:var(--f-m);font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;color:var(--ink50);margin-bottom:.45rem}
.m-val{font-family:var(--f-d);font-size:1.6rem;font-weight:900;letter-spacing:-.03em;line-height:1.1;color:var(--ink)}
.m-sub{font-family:var(--f-m);font-size:.62rem;color:var(--ink50);margin-top:.3rem}

/* ── CHANNEL TOGGLE ── */
.ch-grid{display:flex;flex-wrap:wrap;gap:.5rem}
.ch-btn{display:flex;align-items:center;gap:.55rem;padding:.5rem 1rem;border-radius:8px;border:1.5px solid var(--border);background:var(--bg2);color:var(--ink50);font-family:var(--f-m);font-size:.72rem;transition:all var(--t);cursor:pointer}
.ch-btn:hover{border-color:var(--amber);color:var(--ink)}
.ch-btn.on{border-color:var(--amber);background:var(--a06);color:var(--amber)}
.ch-dot{width:8px;height:8px;border-radius:50%}

/* ── TAG MULTI SELECT ── */
.tag-grid{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.25rem}
.tag-opt{padding:.28rem .75rem;border-radius:999px;border:1.5px solid var(--border);background:var(--bg2);color:var(--ink50);font-family:var(--f-m);font-size:.68rem;cursor:pointer;transition:all var(--t)}
.tag-opt:hover{border-color:var(--amber);color:var(--amber)}
.tag-opt.on{border-color:var(--amber);background:var(--a06);color:var(--amber)}

/* ── SLIDER ROW ── */
.sl-row{padding:.65rem 0;border-bottom:1px solid var(--border)}
.sl-row:last-child{border-bottom:none}
.sl-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:.3rem}
.sl-lbl{font-size:.8rem;color:var(--ink70);display:flex;align-items:center;gap:.5rem}
.sl-val{font-family:var(--f-m);font-size:.78rem;color:var(--amber);font-weight:500}
.sl-sub{font-family:var(--f-m);font-size:.62rem;color:var(--ink30);margin-bottom:.35rem}

/* ── NAMING CONVENTION ── */
.token-rail{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:.85rem}
.token{display:inline-flex;align-items:center;gap:.35rem;padding:.3rem .7rem;border-radius:6px;font-family:var(--f-m);font-size:.68rem;cursor:pointer;transition:all var(--t);border:1.5px solid var(--border);background:var(--bg2);color:var(--ink50)}
.token:hover{border-color:var(--amber);color:var(--amber)}
.token.on{border-color:var(--amber);background:var(--a06);color:var(--amber)}
.token-drag{cursor:grab;color:var(--ink30);font-size:.7rem}
.preview-box{background:var(--bg3);border:1.5px solid var(--border);border-radius:8px;padding:.85rem 1rem;font-family:var(--f-m);font-size:.82rem;color:var(--amber);letter-spacing:.04em;word-break:break-all;position:relative}
.copy-btn{position:absolute;top:.5rem;right:.5rem;padding:.22rem .6rem;border-radius:5px;font-family:var(--f-m);font-size:.6rem;letter-spacing:.08em;border:1px solid var(--border);background:var(--bg);color:var(--ink50);transition:all var(--t);cursor:pointer}
.copy-btn:hover{border-color:var(--amber);color:var(--amber)}
.copy-btn.copied{border-color:var(--green);color:var(--green);background:var(--green-l)}
.name-row{display:flex;align-items:center;gap:.75rem;padding:.65rem .85rem;border-radius:8px;border:1px solid var(--border);background:var(--bg2);margin-bottom:.5rem}
.name-row:last-child{margin-bottom:0}
.name-level{font-family:var(--f-m);font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--ink30);width:70px;flex-shrink:0}
.name-str{font-family:var(--f-m);font-size:.78rem;color:var(--amber);flex:1;word-break:break-all}

/* ── CAMPAIGN TREE ── */
.tree-campaign{border:1.5px solid var(--border);border-radius:10px;margin-bottom:.85rem;overflow:hidden}
.tree-campaign:last-child{margin-bottom:0}
.tree-c-hdr{display:flex;align-items:center;gap:.75rem;padding:.85rem 1.1rem;background:var(--bg3);border-bottom:1px solid var(--border)}
.tree-c-icon{font-size:.9rem}
.tree-c-name{font-family:var(--f-m);font-size:.78rem;color:var(--amber);font-weight:500;flex:1;word-break:break-all}
.tree-adset{display:flex;align-items:flex-start;gap:.75rem;padding:.65rem 1.1rem .65rem 2.5rem;border-bottom:1px solid var(--border);background:var(--bg)}
.tree-adset:last-child{border-bottom:none}
.tree-a-name{font-family:var(--f-m);font-size:.72rem;color:var(--ink70);flex:1;word-break:break-all}
.tree-ads{margin-top:.3rem;display:flex;flex-direction:column;gap:.25rem}
.tree-ad{font-family:var(--f-m);font-size:.65rem;color:var(--ink50);padding:.2rem .5rem;background:var(--bg2);border-radius:4px;border:1px solid var(--border)}

/* ── CHECKLIST ── */
.check-item{display:flex;align-items:flex-start;gap:.85rem;padding:.85rem 1rem;border-radius:8px;border:1px solid var(--border);background:var(--card);margin-bottom:.55rem;cursor:pointer;transition:all var(--t)}
.check-item:hover{border-color:var(--a20)}
.check-item.done{background:var(--green-l);border-color:var(--green-b)}
.check-item.done .ci-title{color:var(--ink50);text-decoration:line-through}
.check-box{width:20px;height:20px;border-radius:5px;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:all var(--t);font-size:.7rem}
.check-item.done .check-box{background:var(--green);border-color:var(--green);color:#fff}
.ci-title{font-size:.82rem;font-weight:700;color:var(--ink);margin-bottom:.15rem;transition:all var(--t)}
.ci-desc{font-size:.75rem;color:var(--ink50);line-height:1.6}
.ci-tag{margin-top:.35rem}

/* ── UTM BUILDER ── */
.utm-box{background:var(--bg3);border:1.5px solid var(--border);border-radius:8px;padding:.85rem 1rem;font-family:var(--f-m);font-size:.75rem;color:var(--ink70);word-break:break-all;line-height:1.8}
.utm-param{color:var(--amber)}
.utm-val{color:var(--blue)}

/* ── SUMMARY EXPORT ── */
.export-section{margin-bottom:1.75rem}
.export-section h3{font-family:var(--f-d);font-size:1.05rem;font-weight:700;margin-bottom:.85rem;letter-spacing:-.02em}
.summary-row{display:flex;padding:.55rem 0;border-bottom:1px solid var(--border);align-items:baseline;gap:1rem}
.summary-row:last-child{border-bottom:none}
.sr-key{font-family:var(--f-m);font-size:.68rem;letter-spacing:.06em;text-transform:uppercase;color:var(--ink50);width:160px;flex-shrink:0}
.sr-val{font-size:.82rem;color:var(--ink);font-weight:500;flex:1}

/* ── CREATIVE BRIEF CARD ── */
.cr-card{border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:.75rem}
.cr-hdr{display:flex;align-items:center;gap:.65rem;padding:.75rem 1rem;background:var(--bg3);border-bottom:1px solid var(--border)}
.cr-format{font-family:var(--f-m);font-size:.72rem;font-weight:500;color:var(--amber)}
.cr-body{padding:.9rem 1rem;display:grid;grid-template-columns:1fr 1fr;gap:.75rem 1.5rem}
@media(max-width:640px){.cr-body{grid-template-columns:1fr}}
.cr-row{display:flex;flex-direction:column;gap:.2rem}
.cr-lbl{font-family:var(--f-m);font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--ink30)}
.cr-val{font-size:.8rem;color:var(--ink70)}

/* ── BTN ── */
.btn-primary{display:inline-flex;align-items:center;gap:.5rem;font-family:var(--f-m);font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;padding:.65rem 1.6rem;border-radius:999px;background:var(--amber);color:#fff;box-shadow:0 4px 18px var(--a30);transition:all var(--t);border:none;cursor:pointer}
.btn-primary:hover{background:var(--amber-h);box-shadow:0 8px 28px var(--a30);transform:translateY(-2px)}
.btn-ghost{display:inline-flex;align-items:center;gap:.5rem;font-family:var(--f-m);font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;padding:.65rem 1.6rem;border-radius:999px;border:1.5px solid var(--border);color:var(--ink50);transition:all var(--t);background:none;cursor:pointer}
.btn-ghost:hover{border-color:var(--ink);color:var(--ink)}

/* ── STEP NAV ── */
.step-nav{display:flex;justify-content:space-between;align-items:center;margin-top:2rem;padding-top:1.25rem;border-top:1px solid var(--border)}

/* ── CHART WRAP ── */
.chart-wrap{position:relative;width:100%}

/* ── HERO BANNER (before start) ── */
.hero-banner{min-height:calc(100vh - 57px);display:flex;align-items:center;justify-content:center;padding:3rem 1.5rem;text-align:center;background:radial-gradient(ellipse 80% 60% at 50% 40%,var(--a06) 0%,transparent 70%)}
.hero-banner h1{font-family:var(--f-d);font-size:clamp(2.5rem,6vw,5rem);font-weight:900;letter-spacing:-.05em;line-height:.95;margin-bottom:1.1rem}
.hero-banner h1 em{color:var(--amber);font-style:italic}
.hero-banner p{font-size:.9rem;color:var(--ink50);max-width:480px;margin:0 auto 2rem;line-height:2}
.module-pills{display:flex;flex-wrap:wrap;gap:.5rem;justify-content:center;margin-bottom:2.5rem}
.module-pill{font-family:var(--f-m);font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;padding:.3rem .9rem;border-radius:999px;background:var(--a06);border:1px solid var(--a20);color:var(--amber)}

hr.divider{border:none;border-top:1px solid var(--border);margin:1.25rem 0}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-i">
    <a href="/" class="logo">raq<span>metrics</span></a>
    <div class="nav-right">
      <div class="avail"><span class="avail-dot"></span>Pre-Launch Planner</div>

<script data-presets="env,react" type="text/babel">
const {useState,useMemo,useCallback,useEffect,useRef}=React;

  'Retail|Ecom|Meta':         {cpm:10,ctr:.016,cvr:.021,cpc:.63},
  'Beauty|Ecom|Meta':         {cpm:12,ctr:.017,cvr:.019,cpc:.71},
  'Beauty|Ecom|TikTok':       {cpm:9, ctr:.022,cvr:.017,cpc:.41},

function getBM(industry,funnel,channel){
  return BM[`${industry}|${funnel}|${channel}`]||BM[`${industry}|${funnel}|Meta`]||{cpm:12,ctr:.012,cvr:.020,cpc:1.0};
}

/* ── Formatters ── */
const f$=(v,d=0)=>v==null||!isFinite(v)?'—':'$'+Number(v).toLocaleString('en',{minimumFractionDigits:d,maximumFractionDigits:d});
const fpct=(v,d=1)=>v==null||!isFinite(v)?'—':(v*100).toFixed(d)+'%';
const fx=(v,d=2)=>v==null||!isFinite(v)?'—':Number(v).toFixed(d)+'x';
const fn=(v,d=0)=>v==null||!isNaN(v)&&!isFinite(v)?'—':Number(v).toLocaleString('en',{maximumFractionDigits:d});
const slug=(s)=>s.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'');
const upper=(s)=>s.toUpperCase().replace(/[^A-Z0-9]+/g,'_');

/* ── Shared UI ── */
function Field({label,note,hint,children}){return(<div className="field"><label className="label">{label}{note&&<span className="label-note">{note}</span>}</label>{children}{hint&&<div className="hint">{hint}</div>}</div>);}
function SLabel({children}){return <div className="sec-lbl">{children}</div>;}
function Card({children,style,className=''}){return <div className={`card ${className}`} style={style}>{children}</div>;}
function MCard({label,val,sub,color='c-amber'}){return(<div className={`m-card ${color}`}><div className="m-lbl">{label}</div><div className="m-val">{val}</div>{sub&&<div className="m-sub">{sub}</div>}</div>);}
function Badge({children,type='b-gray'}){return <span className={`badge ${type}`}>{children}</span>;}
function Divider(){return <hr className="divider"/>;}

function CopyBtn({text}){
  const [copied,setCopied]=useState(false);
  function copy(){navigator.clipboard?.writeText(text).catch(()=>{});setCopied(true);setTimeout(()=>setCopied(false),1800);}
  return <button className={`copy-btn${copied?' copied':''}`} onClick={copy}>{copied?'✓ Copied':'Copy'}</button>;
}

function PageHeader({eyebrow,title,sub}){

const CHANNELS=[

/* ═══════════════════════════════════════
   03 — BUDGET
═══════════════════════════════════════ */
function BudgetSheet({data,setData,onNext,onBack}){
  const set=(k,v)=>setData(p=>({...p,[k]:v}));
  const monthly=data.monthlyBudget||5000;
  const days=data.flightDays||(()=>{if(data.startDate&&data.endDate){const d=Math.ceil((new Date(data.endDate)-new Date(data.startDate))/(1000*60*60*24));return d>0?d:30;}return 30;})();
  const total=+(monthly*(days/30)).toFixed(0);
  const daily=+(total/days).toFixed(2);
  const chs=data.channels||['Meta','Google'];
  const chSplits=data.chSplits||Object.fromEntries(chs.map((c,i)=>[c,Math.round(100/chs.length)]));
  const fuSplit={COLD:data.coldPct||70,WARM:data.warmPct||20,HOT:data.hotPct||10};
  const chSum=Object.values(chSplits).reduce((a,b)=>a+b,0);
  const fuSum=fuSplit.COLD+fuSplit.WARM+fuSplit.HOT;
  const setChSplit=(ch,v)=>setData(p=>({...p,chSplits:{...(p.chSplits||{}),from:undefined,[ch]:v}}));
  const chColors={'Meta':'#1877F2','Google':'#34A853','TikTok':'#FF0050','Snapchat':'#FFFC00','LinkedIn':'#0A66C2','Pinterest':'#E60023'};
  return(<div>
    <PageHeader eyebrow="Module 03 · Budget" title="Budget <em>Allocation</em>" sub="Set your total investment, split it across channels and funnel stages. All projections update live."/>
    <div className="g2">
      <div>
        <Card style={{marginBottom:'1.25rem'}}>
          <SLabel>Total Investment</SLabel>
          <div className="field-row">
            <Field label="Monthly Budget (USD)"><input type="number" step="100" value={monthly} onChange={e=>set('monthlyBudget',+e.target.value)}/></Field>
            <Field label="Flight Duration (days)" hint="Auto-filled from Brief dates"><input type="number" value={days} onChange={e=>set('flightDays',+e.target.value)}/></Field>
          </div>
          <div className="g3" style={{marginTop:'.85rem'}}>
            {[{l:'Total Budget',v:f$(total),c:'c-amber'},{l:'Daily Budget',v:f$(daily,2),c:'c-blue'},{l:'Flight Days',v:days+' days',c:'c-green'}].map(({l,v,c})=><MCard key={l} label={l} val={v} color={c}/>)}
          </div>
        </Card>
        <Card>
          <SLabel>Funnel Split</SLabel>
          <div style={{marginBottom:'.75rem'}}><Badge type={Math.abs(fuSum-100)<1?'b-green':'b-red'}>{Math.abs(fuSum-100)<1?'✓ Valid':'Sum = '+fuSum+'%'}</Badge></div>
          {[{k:'coldPct',l:'Cold / Prospecting',note:'New audiences',def:70},{k:'warmPct',l:'Warm / Engagement',note:'Re-engagement',def:20},{k:'hotPct',l:'Hot / Retargeting',note:'Cart, visitors, past buyers',def:10}].map(({k,l,note,def})=>{
            const v=data[k]||def;
            return(<div key={k} className="sl-row">
              <div className="sl-hdr"><label className="sl-lbl">{l}</label><span className="sl-val">{v}% — {f$(+(daily*v/100).toFixed(2),2)}/day</span></div>
              <div className="sl-sub">{note}</div>
              <input type="range" min="0" max="100" step="1" value={v} onChange={e=>set(k,+e.target.value)}/>
            </div>);
          })}
        </Card>
      </div>
      <div>
        <Card style={{marginBottom:'1.25rem'}}>
          <SLabel>Channel Split</SLabel>
          <div style={{marginBottom:'.75rem'}}><Badge type={Math.abs(chSum-100)<1?'b-green':'b-red'}>{Math.abs(chSum-100)<1?'✓ Valid':'Sum = '+chSum+'%'}</Badge></div>
          {chs.length===0?<p style={{fontSize:'.8rem',color:'var(--ink50)'}}>← Add channels in the Brief tab</p>:chs.map(ch=>{
            const v=chSplits[ch]||Math.round(100/chs.length);
            return(<div key={ch} className="sl-row">
              <div className="sl-hdr"><label className="sl-lbl"><span className="ch-dot" style={{width:8,height:8,borderRadius:'50%',background:chColors[ch]||'#888',display:'inline-block',marginRight:6}}/>{ch}</label><span className="sl-val">{v}% — {f$(+(daily*v/100).toFixed(2),2)}/day</span></div>
              <input type="range" min="0" max="100" step="1" value={v} onChange={e=>setChSplit(ch,+e.target.value)}/>
            </div>);
          })}
        </Card>
        <Card>
          <SLabel>Monthly Channel Breakdown</SLabel>
          {chs.map(ch=>{
            const v=chSplits[ch]||Math.round(100/chs.length);
            return(<div key={ch} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'.55rem 0',borderBottom:'1px solid var(--border)'}}>
              <span style={{display:'flex',alignItems:'center',gap:'.55rem',fontSize:'.82rem'}}><span style={{width:8,height:8,borderRadius:'50%',background:chColors[ch]||'#888',display:'inline-block'}}/>{ch}</span>
              <div style={{textAlign:'right'}}>
                <div style={{fontFamily:'var(--f-d)',fontWeight:900,fontSize:'1.05rem',color:'var(--amber)'}}>{f$(+(monthly*v/100).toFixed(0))}</div>
                <div style={{fontFamily:'var(--f-m)',fontSize:'.62rem',color:'var(--ink50)'}}>{v}% of budget</div>

/* ═══════════════════════════════════════
   04 — BENCHMARKS
═══════════════════════════════════════ */
function BenchmarksSheet({data,onNext,onBack}){
  const chs=data.channels||['Meta'];
  const aov=data.aov||100;const gm=data.grossMargin||.40;
  const tCAC=+(aov*gm).toFixed(2);
  const beROAS=gm>0?+(1/gm).toFixed(2):0;
  const monthly=data.monthlyBudget||5000;
  const days=data.flightDays||30;
  const total=+(monthly*(days/30)).toFixed(0);
  const daily=+(total/days).toFixed(2);
  const chSplits=data.chSplits||{};
  const chColors={'Meta':'#1877F2','Google':'#34A853','TikTok':'#FF0050','Snapchat':'#FFFC00','LinkedIn':'#0A66C2','Pinterest':'#E60023'};

  const chProj=chs.map(ch=>{
    const bm=getBM(data.industry||'Ecommerce',data.funnelType||'Ecom',ch);
    const pct=(chSplits[ch]||Math.round(100/chs.length))/100;
    const chDaily=daily*pct;
    const impr=chDaily/(bm.cpm/1000);
    const clicks=impr*bm.ctr;
    const conv=clicks*bm.cvr;
    const rev=conv*aov;
    const cpa=conv>0?chDaily/conv:null;
    const roas=chDaily>0?rev/chDaily:null;
    return{ch,bm,chDaily,impr,clicks,conv,rev,cpa,roas};
  });

  const totConv=chProj.reduce((a,r)=>a+r.conv,0);
  const totRev=chProj.reduce((a,r)=>a+r.rev,0);
  const totROAS=total>0?totRev/total:0;
  const blendedCPA=totConv>0?total/totConv:null;

  return(<div>
    <PageHeader eyebrow="Module 04 · Benchmarks" title="Expected <em>Performance</em>" sub="Industry-matched benchmarks by channel. These are projections to plan around — not guarantees."/>
    <div className="g4" style={{marginBottom:'1.5rem'}}>
      {[
        {l:'Target CAC',v:f$(tCAC,2),c:'c-amber',sub:'Max cost per acquisition'},
        {l:'Break-Even ROAS',v:fx(beROAS),c:'c-blue',sub:'Minimum to cover COGS'},
        {l:'Est. Total Conv.',v:fn(Math.round(totConv*days)),c:'c-green',sub:'Over full flight'},
        {l:'Est. Total Revenue',v:f$(totRev*days),c:'c-amber',sub:'Over full flight'},
        {l:'Blended ROAS',v:fx(totROAS),c:totROAS>=beROAS?'c-green':'c-red',sub:'Revenue ÷ Spend'},
        {l:'Blended CPA',v:f$(blendedCPA,2),c:blendedCPA&&blendedCPA<=tCAC?'c-green':'c-red',sub:'Cost per conversion'},
        {l:'Daily Impressions',v:fn(Math.round(chProj.reduce((a,r)=>a+r.impr,0))),c:'c-blue',sub:'Across all channels'},
        {l:'Daily Clicks',v:fn(Math.round(chProj.reduce((a,r)=>a+r.clicks,0))),c:'c-amber',sub:'Across all channels'},
      ].map(({l,v,c,sub})=><MCard key={l} label={l} val={v} sub={sub} color={c}/>)}
    </div>
    <div className="g2" style={{gap:'1.25rem'}}>
      {chProj.map(({ch,bm,chDaily,impr,clicks,conv,rev,cpa,roas})=>(
        <Card key={ch}>
          <div style={{display:'flex',alignItems:'center',gap:'.65rem',marginBottom:'1rem',paddingBottom:'.85rem',borderBottom:'1px solid var(--border)'}}>
            <span style={{width:10,height:10,borderRadius:'50%',background:chColors[ch]||'#888',display:'inline-block'}}/>
            <span style={{fontFamily:'var(--f-d)',fontWeight:900,fontSize:'1.1rem'}}>{ch}</span>
            <Badge type="b-gray" style={{marginLeft:'auto'}}>{f$(chDaily,2)}/day</Badge>
          </div>
          <div className="g2" style={{gap:'.65rem'}}>
            {[{l:'CPM',v:f$(bm.cpm,2)},{l:'CTR',v:fpct(bm.ctr)},{l:'CVR',v:fpct(bm.cvr)},{l:'CPC',v:f$(bm.cpc,2)},{l:'Daily Conv.',v:conv.toFixed(1)},{l:'Daily Rev.',v:f$(rev)},{l:'Est. CPA',v:f$(cpa,2)},{l:'Est. ROAS',v:fx(roas)}].map(({l,v})=>(
              <div key={l} className="card-inner" style={{padding:'.65rem .85rem'}}>
                <div style={{fontFamily:'var(--f-m)',fontSize:'.58rem',letterSpacing:'.1em',textTransform:'uppercase',color:'var(--ink50)',marginBottom:'.3rem'}}>{l}</div>
                <div style={{fontFamily:'var(--f-d)',fontWeight:900,fontSize:'1rem',color:'var(--amber)'}}>{v}</div>
              </div>
            ))}
          </div>
          {cpa&&cpa<=tCAC?<div style={{marginTop:'.85rem'}}><Badge type="b-green">✓ CPA within Target CAC</Badge></div>:cpa?<div style={{marginTop:'.85rem'}}><Badge type="b-red">CPA exceeds Target CAC — review budget or margin</Badge></div>:null}
        </Card>
      ))}
    </div>
    <div className="card" style={{marginTop:'1.25rem',borderLeft:'3px solid var(--amber)',padding:'1rem 1.25rem'}}>
      <div style={{fontFamily:'var(--f-m)',fontSize:'.65rem',letterSpacing:'.1em',textTransform:'uppercase',color:'var(--amber)',marginBottom:'.5rem'}}>Benchmark Source</div>
      <p style={{fontSize:'.8rem',color:'var(--ink70)',lineHeight:1.75}}>Benchmarks are based on {data.industry||'Ecommerce'} · {data.funnelType||'Ecom'} averages across MENA and Global markets. Actual performance will vary by creative quality, landing page, offer strength and audience match. Use these to plan and sanity-check — not as guarantees.</p>
    </div>
    <StepNav onBack={onBack} backLabel="← Budget" onNext={onNext} nextLabel="Structure →"/>
  </div>);
}

/* ═══════════════════════════════════════

            <Field label="Ads per Adset" hint="Creatives per adset"><input type="number" min="1" max="10" value={nads} onChange={e=>set('adsPerAdset',+e.target.value)}/></Field>
            <Field label="Total Channels">{<div style={{fontFamily:'var(--f-d)',fontWeight:900,fontSize:'1.5rem',color:'var(--amber)',marginTop:'.35rem'}}>{chs.length}</div>}</Field>
          </div>
          <Divider/>
          <div className="g4" style={{gap:'.65rem'}}>
            {[
              {l:'Total Campaigns',v:nc*chs.length},
              {l:'Total Adsets',v:nc*chs.length*nas},

              <div style={{fontFamily:'var(--f-d)',fontWeight:900,fontSize:'1.4rem',color:'var(--amber)'}}>{v}</div>
            </div>)}

        </Card>

          <SLabel>Budget per Unit</SLabel>

            <div key={l} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'.6rem 0',borderBottom:'1px solid var(--border)'}}>
              <span style={{fontSize:'.82rem',color:'var(--ink70)'}}>{l}</span>

/* ═══════════════════════════════════════
   06 — NAMING CONVENTION
═══════════════════════════════════════ */
const ALL_TOKENS=[
  {id:'BRAND',label:'Brand',example:d=>upper(d.brand||'BRAND').slice(0,8)},
  {id:'COUNTRY',label:'Country',example:d=>upper(d.country||'UAE').slice(0,3)},
  {id:'CHANNEL',label:'Channel',example:_=>'META'},
  {id:'OBJECTIVE',label:'Objective',example:d=>upper(d.objective||'CONV').slice(0,6)},
  {id:'FUNNEL',label:'Funnel Stage',example:_=>'COLD'},
  {id:'AUDIENCE',label:'Audience',example:_=>'INT'},
  {id:'FORMAT',label:'Ad Format',example:_=>'VID'},
  {id:'ANGLE',label:'Creative Angle',example:_=>'PAIN'},
  {id:'AGE',label:'Age Range',example:d=>`${d.ageMin||18}-${d.ageMax||45}`},
  {id:'GENDER',label:'Gender',example:d=>d.gender==='All'?'ALL':d.gender==='Male'?'M':'F'},
  {id:'DATE',label:'Date',example:_=>{const d=new Date();return`${d.getFullYear()}Q${Math.ceil((d.getMonth()+1)/3)}`;}},
  {id:'VERSION',label:'Version',example:_=>'V1'},
  {id:'PLACEMENT',label:'Placement',example:_=>'FEED'},
];

function NamingSheet({data,setData,onNext,onBack}){
  const set=(k,v)=>setData(p=>({...p,[k]:v}));
  const cToks=data.campTokens||['BRAND','COUNTRY','CHANNEL','OBJECTIVE','FUNNEL','DATE'];
  const aToks=data.adsetTokens||['FUNNEL','AUDIENCE','AGE','GENDER'];
  const adToks=data.adTokens||['FORMAT','ANGLE','VERSION'];
  const sep=data.separator||'_';
  const chs=data.channels||['Meta'];
  const stages=data.stages||['COLD','WARM','HOT'];
  const nc=data.numCampaigns||2;const nas=data.adsetsPerCampaign||3;const nads=data.adsPerAdset||4;

  function buildName(toks,overrides={}){
    return toks.map(tid=>{
      const tok=ALL_TOKENS.find(t=>t.id===tid);
      return overrides[tid]||tok?.example(data)||tid;
    }).join(sep);
  }

  function toggleTok(key,tid){
    setData(p=>{
      const arr=p[key]||[];
      return{...p,[key]:arr.includes(tid)?arr.filter(x=>x!==tid):[...arr,tid]};
    });
  }

  const campPreview=buildName(cToks,{CHANNEL:'META',FUNNEL:'COLD'});
  const adsetPreview=buildName(aToks,{FUNNEL:'COLD',AUDIENCE:'INT25-45'});
  const adPreview=buildName(adToks,{FORMAT:'VID',ANGLE:'PAIN',VERSION:'V1'});

  const audiences=['INT25-45','LAL180D','RETGT-CART','RETGT-VIEW','CRM-LIST','INT18-34-F','BROAD'];
  const formats=['VID','STATIC','UGC','CAROUSEL','REEL','STORY'];
  const angles=['PAIN','OFFER','SOCIAL','COMP','FEAT','BENE','UGCR'];

  const exampleNames=[];
  chs.slice(0,2).forEach(ch=>{
    stages.slice(0,2).forEach(stage=>{
      exampleNames.push({
        level:'Campaign',ch,stage,
        name:buildName(cToks,{CHANNEL:upper(ch),FUNNEL:stage,BRAND:upper(data.brand||'BRAND').slice(0,8),COUNTRY:upper(data.country||'UAE').slice(0,3),OBJECTIVE:upper(data.objective||'CONV').slice(0,6),DATE:'2025Q2'}),
      });
      audiences.slice(0,2).forEach(aud=>{
        exampleNames.push({
          level:'Adset',ch,stage,aud,
          name:buildName(aToks,{FUNNEL:stage,AUDIENCE:aud,AGE:`${data.ageMin||18}-${data.ageMax||45}`,GENDER:data.gender==='Male'?'M':data.gender==='Female'?'F':'ALL'}),
        });
        formats.slice(0,1).forEach(fmt=>{
          angles.slice(0,1).forEach((ang,vi)=>{
            exampleNames.push({
              level:'Ad',ch,stage,aud,fmt,ang,
              name:buildName(adToks,{FORMAT:fmt,ANGLE:ang,VERSION:`V${vi+1}`,PLACEMENT:'FEED'}),
            });
          });
        });
      });
    });
  });

  return(<div>
    <PageHeader eyebrow="Module 06 · Naming Convention" title="Naming <em>Convention</em>" sub="Select token fields and order to auto-generate consistent names for every campaign, adset and ad. Copy any name instantly."/>
    <div className="g2" style={{marginBottom:'1.25rem'}}>
      <Card>
        <SLabel>Convention Builder</SLabel>
        <div className="field" style={{marginBottom:'.85rem'}}>
          <label className="label">Separator</label>
          <div style={{display:'flex',gap:'.4rem'}}>
            {['_','-','|','/'].map(s=><button key={s} className={`tag-opt${sep===s?' on':''}`} onClick={()=>set('separator',s)} style={{padding:'.25rem .75rem',fontFamily:'var(--f-m)'}}>{s}</button>)}
          </div>
        </div>
        {[
          {key:'campTokens',label:'Campaign Name Tokens',toks:cToks,preview:campPreview},
          {key:'adsetTokens',label:'Adset Name Tokens',toks:aToks,preview:adsetPreview},
          {key:'adTokens',label:'Ad Name Tokens',toks:adToks,preview:adPreview},
        ].map(({key,label,toks,preview})=>(
          <div key={key} style={{marginBottom:'1.1rem'}}>
            <label className="label">{label}</label>
            <div className="token-rail">
              {ALL_TOKENS.map(tok=><button key={tok.id} className={`token${toks.includes(tok.id)?' on':''}`} onClick={()=>toggleTok(key,tok.id)}>{toks.includes(tok.id)?<span className="token-drag">✦</span>:null}{tok.label}</button>)}
            </div>
            <div className="preview-box">{preview||'—'}<CopyBtn text={preview}/></div>
          </div>
        ))}
      </Card>
      <div>
        <Card>
          <SLabel>Generated Name Examples</SLabel>
          <p style={{fontSize:'.75rem',color:'var(--ink50)',marginBottom:'1rem',lineHeight:1.7}}>Auto-generated from your campaign structure. All {nc*chs.length} campaigns × {nas} adsets × {nads} ads follow this pattern.</p>
          {exampleNames.map((n,i)=>(
            <div key={i} className="name-row">
              <span className="name-level" style={{color:n.level==='Campaign'?'var(--amber)':n.level==='Adset'?'var(--blue)':'var(--ink30)',paddingLeft:n.level==='Adset'?'0.75rem':n.level==='Ad'?'1.5rem':'0'}}>{n.level}</span>
              <span className="name-str">{n.name}</span>
              <CopyBtn text={n.name}/>
            </div>
          ))}
        </Card>
      </div>
    </div>
    <StepNav onBack={onBack} backLabel="← Structure" onNext={onNext} nextLabel="Creative Brief →"/>
  </div>);
}

/* ═══════════════════════════════════════
   07 — CREATIVE BRIEF

      <div>
        <Card style={{marginBottom:'1.25rem'}}>
          <SLabel>Ad Formats</SLabel>
          <div className="tag-grid">{allFormats.map(f=><button key={f} className={`tag-opt${formats.includes(f)?' on':''}`} onClick={()=>toggleFmt(f)}>{f}</button>)}</div>

/* ═══════════════════════════════════════
   08 — TRACKING
═══════════════════════════════════════ */
function TrackingSheet({data,setData,onNext,onBack}){
  const set=(k,v)=>setData(p=>({...p,[k]:v}));
  const chs=data.channels||['Meta'];
  const brand=slug(data.brand||'brand');const campaign=slug(data.businessGoal||'campaign').slice(0,20);
  const url=data.landingPage||'https://yoursite.com/page';

  function buildUTM(ch,med){
    const params=[
      ['utm_source',ch.toLowerCase()],
      ['utm_medium',med||'paid'],
      ['utm_campaign',campaign||'campaign'],
      ['utm_content','{{ad.name}}'],
      ['utm_term','{{adset.name}}'],
    ];
    return url+'?'+params.map(([k,v])=>`${k}=${encodeURIComponent(v)}`).join('&');
  }

  const chMedium={'Meta':'paid_social','Google':'cpc','TikTok':'paid_social','Snapchat':'paid_social','LinkedIn':'paid_social','Pinterest':'paid_social'};
  const pixelChecks=[
    {id:'pixel_installed',title:'Pixel / Tag installed on all pages',desc:'Meta Pixel, Google Tag, TikTok Pixel — verified in Tag Manager or source code',ch:null},
    {id:'conv_event',title:'Conversion event firing correctly',desc:'Purchase, Lead, Complete Registration event tested and verified',ch:null},
    {id:'test_events',title:'Test events verified in platform',desc:'Meta Events Manager → Test Events · Google Tag Assistant → Tag fired',ch:null},
    {id:'gtm_live',title:'Google Tag Manager published',desc:'Workspace changes published and live on the production site',ch:null},
    {id:'ga4_linked',title:'GA4 linked to ad platform',desc:'Google Ads ↔ GA4 linked · Meta ↔ GA4 via native integration or third-party',ch:null},
    {id:'meta_pixel',title:'Meta Pixel deduplication active',desc:'Server-side events (CAPI) configured to prevent duplicate conversion signals',ch:'Meta'},
    {id:'utm_consistent',title:'UTM structure consistent across all ads',desc:'All ad URLs use the same UTM convention — no manual typos',ch:null},
    {id:'url_params_test',title:'URL parameters working on landing page',desc:'Visited the UTM URL — params appear in GA4 → Reports → Acquisition',ch:null},
  ];
  const [checked,setChecked]=useState(data.trackingChecked||{});
  function toggle(id){const n={...checked,[id]:!checked[id]};setChecked(n);set('trackingChecked',n);}
  const done=Object.values(checked).filter(Boolean).length;

  return(<div>
    <PageHeader eyebrow="Module 08 · Tracking" title="UTMs & <em>Tracking</em>" sub="Auto-built UTM links per channel and a pixel verification checklist. Nothing launches without clean tracking."/>
    <div className="g2">
      <div>
        <Card style={{marginBottom:'1.25rem'}}>
          <SLabel>UTM Settings</SLabel>
          <Field label="Landing Page URL"><input value={data.landingPage||''} onChange={e=>set('landingPage',e.target.value)} placeholder="https://yoursite.com/landing-page"/></Field>
          <Field label="Campaign Slug" hint="Auto-generated from your business goal — edit if needed"><input value={data.utmCampaign||campaign} onChange={e=>set('utmCampaign',e.target.value)}/></Field>
        </Card>
        <Card>
          <SLabel>Generated UTM Links</SLabel>
          {chs.map(ch=>(
            <div key={ch} style={{marginBottom:'1rem'}}>
              <div style={{fontFamily:'var(--f-m)',fontSize:'.65rem',letterSpacing:'.1em',textTransform:'uppercase',color:'var(--ink50)',marginBottom:'.4rem'}}>{ch}</div>
              <div className="utm-box" style={{fontSize:'.72rem'}}>
                <span className="utm-param">utm_source</span>=<span className="utm-val">{ch.toLowerCase()}</span>&nbsp;
                <span className="utm-param">utm_medium</span>=<span className="utm-val">{chMedium[ch]||'paid'}</span>&nbsp;
                <span className="utm-param">utm_campaign</span>=<span className="utm-val">{data.utmCampaign||campaign}</span>&nbsp;
                <span className="utm-param">utm_content</span>=<span className="utm-val">&#123;&#123;ad.name&#125;&#125;</span>&nbsp;
                <span className="utm-param">utm_term</span>=<span className="utm-val">&#123;&#123;adset.name&#125;&#125;</span>
              </div>
              <div style={{marginTop:'.4rem',display:'flex',justifyContent:'flex-end'}}><CopyBtn text={buildUTM(ch,chMedium[ch])}/></div>
            </div>
          ))}
        </Card>
      </div>
      <Card>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'1rem'}}>
          <div className="sec-lbl" style={{margin:0}}>Tracking Checklist</div>
          <Badge type={done===pixelChecks.length?'b-green':'b-amber'}>{done}/{pixelChecks.length} complete</Badge>
        </div>
        {pixelChecks.map(item=>(
          <div key={item.id} className={`check-item${checked[item.id]?' done':''}`} onClick={()=>toggle(item.id)}>
            <div className="check-box">{checked[item.id]?'✓':''}</div>
            <div>
              <div className="ci-title">{item.title}</div>
              <div className="ci-desc">{item.desc}</div>
              {item.ch&&<div className="ci-tag"><Badge type="b-blue">{item.ch} only</Badge></div>}
            </div>
          </div>
        ))}
      </Card>
    </div>
    <StepNav onBack={onBack} backLabel="← Creative" onNext={onNext} nextLabel="Checklist →"/>
  </div>);
}

/* ═══════════════════════════════════════
   09 — LAUNCH CHECKLIST
═══════════════════════════════════════ */
function ChecklistSheet({data,setData,onNext,onBack}){
  const set=(k,v)=>setData(p=>({...p,[k]:v}));
  const chs=data.channels||['Meta'];
  const allItems=[
    {id:'brief_approved',cat:'Pre-Launch',title:'Campaign brief approved by client / stakeholder',desc:'Goal, budget, timeline, KPIs, exclusions all confirmed in writing'},
    {id:'lp_live',cat:'Pre-Launch',title:'Landing page is live and tested',desc:'Page loads correctly, CTA works, mobile-responsive, speed > 80 on PageSpeed Insights'},
    {id:'lp_pixel',cat:'Pre-Launch',title:'Pixel fires on landing page and thank-you page',desc:'Verified via browser extension — no duplicate fires'},
    {id:'audience_ready',cat:'Pre-Launch',title:'Custom audiences uploaded and warmed',desc:'CRM lists processed, lookalike seeds have ≥ 1,000 matched users'},
    {id:'creatives_approved',cat:'Pre-Launch',title:'All creatives approved and spec-compliant',desc:'File sizes, ratios, text overlay limits, no prohibited content'},
    {id:'budget_set',cat:'Campaign Setup',title:'Campaign budgets set correctly',desc:'Daily or lifetime budget confirmed — not default or placeholder values'},
    {id:'naming_applied',cat:'Campaign Setup',title:'Naming convention applied to all campaigns',desc:'All campaigns, adsets and ads follow the naming structure'},
    {id:'utm_applied',cat:'Campaign Setup',title:'UTM parameters applied to all ad URLs',desc:'Every ad link includes source, medium, campaign, content and term'},
    {id:'conversion_event',cat:'Campaign Setup',title:'Correct conversion event selected per campaign',desc:'Purchase for Ecom, Lead for Lead Gen, Install for App — verified'},
    {id:'bid_strategy',cat:'Campaign Setup',title:'Bid strategy confirmed',desc:'Lowest cost vs target cost vs bid cap — aligned to objective and budget phase'},
    {id:'placements_reviewed',cat:'Campaign Setup',title:'Placements reviewed and configured',desc:'Automatic placements or manual selection confirmed. Story/Reels creatives provided if needed'},
    {id:'schedule_set',cat:'Campaign Setup',title:'Start date / end date confirmed',desc:'Campaign scheduled correctly — not running immediately unless intended'},
    {id:'double_check_spend',cat:'Pre-Go-Live',title:'Spend cap confirmed — no runaway risk',desc:'Account spending limit set. Daily budget sanity-checked against total monthly plan'},
    {id:'preview_links',cat:'Pre-Go-Live',title:'Ad preview links shared and approved',desc:'All ad copies reviewed — correct headlines, copy, images, CTA, destination URL'},
    {id:'team_notified',cat:'Pre-Go-Live',title:'Team / client notified of go-live date',desc:'Reporting schedule agreed — daily check-ins for first 72 hours'},
    {id:'first_48_monitor',cat:'Post-Launch',title:'72-hour monitoring plan in place',desc:'Who monitors? At what frequency? What are the KPI thresholds to act?'},
    {id:'reporting_template',cat:'Post-Launch',title:'Reporting template or dashboard set up',desc:'Weekly report format agreed with client or internal stakeholder'},
  ];
  const cats=[...new Set(allItems.map(i=>i.cat))];
  const checked=data.launchChecked||{};
  function toggle(id){const n={...checked,[id]:!checked[id]};setData(p=>({...p,launchChecked:n}));}
  const done=Object.values(checked).filter(Boolean).length;
  const pct=Math.round(done/allItems.length*100);

  return(<div>
    <PageHeader eyebrow="Module 09 · Launch Checklist" title="Launch <em>Readiness</em>" sub="Every item must be green before going live. Share this with your team or client as the final sign-off document."/>
    <div style={{display:'flex',align:'center',gap:'1rem',marginBottom:'1.5rem',flexWrap:'wrap',alignItems:'center'}}>
      <div style={{flex:1,minWidth:200}}>
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:'.4rem'}}>
          <span style={{fontFamily:'var(--f-m)',fontSize:'.7rem',color:'var(--ink50)'}}>Overall readiness</span>
          <span style={{fontFamily:'var(--f-d)',fontWeight:900,fontSize:'1.1rem',color:pct===100?'var(--green)':pct>60?'var(--amber)':'var(--red)'}}>{pct}%</span>
        </div>
        <div className="prog-track" style={{height:6}}>
          <div className="prog-fill" style={{width:pct+'%',background:pct===100?'var(--green)':pct>60?'var(--amber)':'var(--red)'}}/>
        </div>
      </div>
      <Badge type={pct===100?'b-green':pct>70?'b-amber':'b-red'} style={{padding:'.35rem 1rem',fontSize:'.72rem'}}>{done}/{allItems.length} items complete {pct===100?'— Ready to Launch 🚀':''}</Badge>
    </div>
    {cats.map(cat=>(
      <div key={cat} style={{marginBottom:'1.5rem'}}>
        <SLabel>{cat}</SLabel>
        {allItems.filter(i=>i.cat===cat).map(item=>(
          <div key={item.id} className={`check-item${checked[item.id]?' done':''}`} onClick={()=>toggle(item.id)}>
            <div className="check-box">{checked[item.id]?'✓':''}</div>
            <div style={{flex:1}}>
              <div className="ci-title">{item.title}</div>
              <div className="ci-desc">{item.desc}</div>
            </div>
          </div>
        ))}
      </div>
    ))}
    <StepNav onBack={onBack} backLabel="← Tracking" onNext={onNext} nextLabel="View Summary →"/>
  </div>);
}

/* ═══════════════════════════════════════
   10 — SUMMARY
═══════════════════════════════════════ */
function SummarySheet({data,onBack}){
  const [printing,setPrinting]=useState(false);
  const chs=data.channels||['Meta'];
  const monthly=data.monthlyBudget||5000;const days=data.flightDays||30;
  const total=+(monthly*(days/30)).toFixed(0);const daily=+(total/days).toFixed(2);
  const aov=data.aov||100;const gm=data.grossMargin||.40;
  const tCAC=+(aov*gm).toFixed(2);const beROAS=gm>0?+(1/gm).toFixed(2):0;
  const nc=data.numCampaigns||2;const nas=data.adsetsPerCampaign||3;const nads=data.adsPerAdset||4;
  const chSplits=data.chSplits||{};
  const allItemsDone=Object.values(data.launchChecked||{}).filter(Boolean).length;
  const totalCheckItems=17;
  const pct=Math.round(allItemsDone/totalCheckItems*100);

  function print(){window.print();}

  const sep=data.separator||'_';
  const ALL_TOKENS_MAP=Object.fromEntries(ALL_TOKENS.map(t=>[t.id,t]));
  function buildName(toks,overrides={}){return(toks||[]).map(tid=>{const tok=ALL_TOKENS_MAP[tid];return overrides[tid]||tok?.example(data)||tid;}).join(sep);}
  const campPrev=buildName(data.campTokens||['BRAND','COUNTRY','CHANNEL','OBJECTIVE','FUNNEL','DATE'],{CHANNEL:'META',FUNNEL:'COLD'});
  const adsetPrev=buildName(data.adsetTokens||['FUNNEL','AUDIENCE','AGE','GENDER'],{AUDIENCE:'INT25-45'});
  const adPrev=buildName(data.adTokens||['FORMAT','ANGLE','VERSION'],{FORMAT:'VID',ANGLE:'PAIN',VERSION:'V1'});

  return(<div>
    <PageHeader eyebrow="Module 10 · Summary" title="Campaign <em>Plan</em>" sub="Your complete pre-launch plan. Print or copy this to share with your team or client."/>
    <div style={{display:'flex',gap:'.65rem',marginBottom:'1.5rem',flexWrap:'wrap'}}>
      <Badge type={pct===100?'b-green':pct>70?'b-amber':'b-red'}>{pct}% Launch Ready</Badge>
      <Badge type="b-blue">{chs.join(' · ')}</Badge>
      <Badge type="b-amber">{f$(total)} total budget</Badge>
      <Badge type="b-gray">{days} days</Badge>
      <button className="btn-primary" style={{marginLeft:'auto'}} onClick={print}>Print / Save PDF</button>
    </div>
    <div className="g2" style={{gap:'1.25rem',marginBottom:'1.25rem'}}>
      <div>
        <Card className="card-accent" style={{marginBottom:'1.25rem'}}>
          <h3 style={{fontFamily:'var(--f-d)',fontSize:'1.05rem',fontWeight:900,marginBottom:'.85rem',letterSpacing:'-.02em'}}>Campaign Brief</h3>
          {[
            {k:'Brand',v:data.brand||'—'},{k:'Market',v:data.country||'—'},{k:'Industry',v:data.industry||'—'},
            {k:'Product',v:data.product||'—'},{k:'Objective',v:data.objective||'—'},{k:'Funnel Type',v:data.funnelType||'—'},
            {k:'Business Goal',v:data.businessGoal||'—'},{k:'Channels',v:chs.join(', ')},{k:'Key KPIs',v:(data.kpis||[]).join(', ')||'—'},
          ].map(({k,v})=><div key={k} className="summary-row"><span className="sr-key">{k}</span><span className="sr-val">{v}</span></div>)}
        </Card>
        <Card className="card-accent" style={{marginBottom:'1.25rem'}}>
          <h3 style={{fontFamily:'var(--f-d)',fontSize:'1.05rem',fontWeight:900,marginBottom:'.85rem',letterSpacing:'-.02em'}}>Budget Plan</h3>
          {[
            {k:'Monthly Budget',v:f$(monthly)},{k:'Total Budget',v:f$(total)},{k:'Flight Period',v:`${days} days`},
            {k:'Daily Budget',v:f$(daily,2)},{k:'Target CAC',v:f$(tCAC,2)},{k:'Break-Even ROAS',v:fx(beROAS)},
          ].map(({k,v})=><div key={k} className="summary-row"><span className="sr-key">{k}</span><span className="sr-val" style={{fontFamily:'var(--f-m)',color:'var(--amber)'}}>{v}</span></div>)}
          {chs.map(ch=>{const pct=(chSplits[ch]||Math.round(100/chs.length));return(<div key={ch} className="summary-row"><span className="sr-key">{ch} Budget</span><span className="sr-val" style={{fontFamily:'var(--f-m)'}}>{f$(+(monthly*pct/100).toFixed(0))} ({pct}%)</span></div>);})}
        </Card>
        <Card className="card-accent">
          <h3 style={{fontFamily:'var(--f-d)',fontSize:'1.05rem',fontWeight:900,marginBottom:'.85rem',letterSpacing:'-.02em'}}>Audience</h3>
          {[
            {k:'Age',v:`${data.ageMin||18}–${data.ageMax||45}`},{k:'Gender',v:data.gender||'All'},
            {k:'Language',v:data.language||'—'},{k:'Geo Detail',v:data.geoDetail||data.country||'—'},
            {k:'Interests',v:(data.interests||[]).join(', ')||'—'},{k:'Funnel Stages',v:(data.stages||['COLD','WARM','HOT']).join(', ')},
          ].map(({k,v})=><div key={k} className="summary-row"><span className="sr-key">{k}</span><span className="sr-val">{v}</span></div>)}
        </Card>
      </div>
      <div>
        <Card className="card-accent" style={{marginBottom:'1.25rem'}}>
          <h3 style={{fontFamily:'var(--f-d)',fontSize:'1.05rem',fontWeight:900,marginBottom:'.85rem',letterSpacing:'-.02em'}}>Campaign Structure</h3>
          {[
            {k:'Channels',v:chs.length},{k:'Campaigns / Channel',v:nc},{k:'Adsets / Campaign',v:nas},
            {k:'Ads / Adset',v:nads},{k:'Total Campaigns',v:nc*chs.length},{k:'Total Adsets',v:nc*chs.length*nas},
            {k:'Total Ads',v:nc*chs.length*nas*nads},{k:'Creatives Needed',v:nc*chs.length*nas*nads},
          ].map(({k,v})=><div key={k} className="summary-row"><span className="sr-key">{k}</span><span className="sr-val" style={{fontFamily:'var(--f-m)',color:'var(--amber)',fontWeight:700}}>{v}</span></div>)}
        </Card>
        <Card className="card-accent" style={{marginBottom:'1.25rem'}}>
          <h3 style={{fontFamily:'var(--f-d)',fontSize:'1.05rem',fontWeight:900,marginBottom:'.85rem',letterSpacing:'-.02em'}}>Naming Convention</h3>
          {[{l:'Campaign',v:campPrev},{l:'Adset',v:adsetPrev},{l:'Ad',v:adPrev}].map(({l,v})=>(
            <div key={l} style={{marginBottom:'.75rem'}}>
              <div style={{fontFamily:'var(--f-m)',fontSize:'.6rem',letterSpacing:'.1em',textTransform:'uppercase',color:'var(--ink50)',marginBottom:'.3rem'}}>{l} Pattern</div>
              <div className="preview-box" style={{fontSize:'.75rem',paddingRight:'4.5rem'}}>{v||'—'}<CopyBtn text={v}/></div>
            </div>
          ))}
        </Card>
        <Card className="card-accent">
          <h3 style={{fontFamily:'var(--f-d)',fontSize:'1.05rem',fontWeight:900,marginBottom:'.85rem',letterSpacing:'-.02em'}}>Creative Brief</h3>
          {[
            {k:'Formats',v:(data.creativeFormats||[]).join(', ')||'—'},{k:'Angles',v:(data.creativeAngles||[]).join(', ')||'—'},
            {k:'Primary CTA',v:data.cta||'—'},{k:'Key USP',v:data.usp||'—'},{k:'Offer',v:data.offer||'—'},
          ].map(({k,v})=><div key={k} className="summary-row"><span className="sr-key">{k}</span><span className="sr-val">{v}</span></div>)}
          <Divider/>
          <div className="summary-row"><span className="sr-key">Launch Readiness</span>
            <span style={{fontFamily:'var(--f-m)',fontWeight:700,color:pct===100?'var(--green)':pct>70?'var(--amber)':'var(--red)'}}>{pct}% ({allItemsDone}/{totalCheckItems} items)</span>
          </div>
          <div className="summary-row"><span className="sr-key">Tracking URL</span><span className="sr-val" style={{fontSize:'.75rem',wordBreak:'break-all',color:'var(--blue)'}}>{data.landingPage||'—'}</span></div>
        </Card>
      </div>
    </div>
    <div style={{textAlign:'center',padding:'1rem 0',color:'var(--ink50)',fontFamily:'var(--f-m)',fontSize:'.65rem',letterSpacing:'.1em',textTransform:'uppercase'}}>
      Built with Raqmetrics Pre-Launch Planner · raqmetrics.com
    </div>
    <StepNav onBack={onBack} backLabel="← Checklist" onNext={()=>{}} nextLabel=""/>
  </div>);
}

  return(<div className="hero-banner">
    <div style={{maxWidth:640}}>
      <div className="page-eyebrow" style={{justifyContent:'center',marginBottom:'1.2rem'}}>Pre-Launch Campaign Planner</div>
      <h1>Build every campaign<br/><em>before</em> you spend a dollar.</h1>

/* ═══════════════════════════════════════
   ROOT APP
═══════════════════════════════════════ */
const STEPS=[
  {id:'brief',    label:'Brief',      icon:'📋'},
  {id:'audience', label:'Audience',   icon:'👥'},
  {id:'budget',   label:'Budget',     icon:'💰'},
  {id:'benchmarks',label:'Benchmarks',icon:'📊'},
  {id:'structure',label:'Structure',  icon:'🏗'},
  {id:'naming',   label:'Naming',     icon:'🏷'},
  {id:'creative', label:'Creatives',  icon:'🎨'},
  {id:'tracking', label:'Tracking',   icon:'📡'},
  {id:'checklist',label:'Checklist',  icon:'✅'},
  {id:'summary',  label:'Summary',    icon:'📄'},
];

function isDone(id,data){
  switch(id){
    case 'brief':return!!(data.brand&&data.businessGoal&&(data.channels||[]).length>0);
    case 'audience':return!!(data.ageMin&&data.ageMax);
    case 'budget':return!!(data.monthlyBudget&&data.monthlyBudget>0);
    case 'benchmarks':return true;
    case 'structure':return!!(data.numCampaigns&&data.adsetsPerCampaign&&data.adsPerAdset);
    case 'naming':return!!(data.campTokens&&data.campTokens.length>0);
    case 'creative':return!!(data.creativeFormats&&data.creativeFormats.length>0);
    case 'tracking':return!!(data.landingPage);
    case 'checklist':return Object.values(data.launchChecked||{}).filter(Boolean).length>10;
    case 'summary':return false;
    default:return false;
  }
}

function App(){
  const [started,setStarted]=useState(false);
  const [step,setStep]=useState(0);
  const [data,setData]=useState({channels:['Meta','Google'],stages:['COLD','WARM','HOT'],kpis:['ROAS','CPA','CTR'],country:'UAE',industry:'Ecommerce',funnelType:'Ecom',objective:'Conversions',gender:'All',ageMin:18,ageMax:45,monthlyBudget:5000,grossMargin:.40,aov:150,numCampaigns:2,adsetsPerCampaign:3,adsPerAdset:4,coldPct:70,warmPct:20,hotPct:10,creativeFormats:['Video (15s)','Static Image'],creativeAngles:['Pain Point','Offer / Discount','Social Proof'],cta:'Shop Now'});
  const done=STEPS.filter(s=>isDone(s.id,data)).length;
  const pct=Math.round(done/STEPS.length*100);
  const go=(n)=>{setStep(n);window.scrollTo({top:0,behavior:'smooth'})};
  if(!started) return <Hero onStart={()=>setStarted(true)}/>;
  return(<div className="shell">
    <aside className="sidebar">
      {STEPS.map((s,i)=>{
        const d=isDone(s.id,data);
        return(<button key={s.id} className={`sb-btn${step===i?' on':''}${d?' done':''}`} onClick={()=>go(i)}>
          <span className="sb-num">{i+1}</span>{s.icon} {s.label}<span className="sb-check">✓</span>
        </button>);
      })}
      <div style={{flex:1}}/>
      <div className="sb-progress">
        <div className="sb-prog-label"><span>Progress</span><span>{pct}%</span></div>
        <div className="prog-track"><div className="prog-fill" style={{width:pct+'%'}}/></div>
      </div>
    </aside>
    <main className="main">
      {step===0&&<BriefSheet data={data} setData={setData} onNext={()=>go(1)}/>}
      {step===1&&<AudienceSheet data={data} setData={setData} onNext={()=>go(2)} onBack={()=>go(0)}/>}
      {step===2&&<BudgetSheet data={data} setData={setData} onNext={()=>go(3)} onBack={()=>go(1)}/>}
      {step===3&&<BenchmarksSheet data={data} onNext={()=>go(4)} onBack={()=>go(2)}/>}
      {step===4&&<StructureSheet data={data} setData={setData} onNext={()=>go(5)} onBack={()=>go(3)}/>}
      {step===5&&<NamingSheet data={data} setData={setData} onNext={()=>go(6)} onBack={()=>go(4)}/>}
      {step===6&&<CreativeSheet data={data} setData={setData} onNext={()=>go(7)} onBack={()=>go(5)}/>}
      {step===7&&<TrackingSheet data={data} setData={setData} onNext={()=>go(8)} onBack={()=>go(6)}/>}
      {step===8&&<ChecklistSheet data={data} setData={setData} onNext={()=>go(9)} onBack={()=>go(7)}/>}
      {step===9&&<SummarySheet data={data} onBack={()=>go(8)}/>}
    </main>
  </div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
