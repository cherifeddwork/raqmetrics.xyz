function SummarySheet({data,onBack,goToStep}){
  const chs=data.channels||['Meta'];
  const monthly=data.monthlyBudget||5000;const days=data.flightDays||30;
  const total=+(monthly*(days/30)).toFixed(0);const daily=+(total/days).toFixed(2);
  const aov=data.aov||100;const gm=data.grossMargin||.40;
  const tCAC=+(aov*gm).toFixed(2);const beROAS=gm>0?+(1/gm).toFixed(2):0;
  const nc=data.numCampaigns||2;const nas=data.adsetsPerCampaign||3;const nads=data.adsPerAdset||4;
  const chSplits=data.chSplits||{};

  const {score,dims}=useMemo(()=>calcReadinessScore(data),[data]);
  const decision=useMemo(()=>getDecision(score,data),[score,data]);
  const risks=useMemo(()=>getRiskWarnings(data),[data]);

  const sep=data.separator||'_';
  const ALL_TOKENS_MAP=Object.fromEntries(ALL_TOKENS.map(t=>[t.id,t]));
  function buildName(toks,overrides={}){return(toks||[]).map(tid=>{const tok=ALL_TOKENS_MAP[tid];return overrides[tid]||tok?.example(data)||tid;}).join(sep);}
  const campPrev=buildName(data.campTokens||['BRAND','COUNTRY','CHANNEL','OBJECTIVE','FUNNEL','DATE'],{CHANNEL:'META',FUNNEL:'COLD'});
  const adsetPrev=buildName(data.adsetTokens||['FUNNEL','AUDIENCE','AGE','GENDER'],{AUDIENCE:'INT25-45'});
  const adPrev=buildName(data.adTokens||['FORMAT','ANGLE','VERSION'],{FORMAT:'VID',ANGLE:'PAIN',VERSION:'V1'});

  const scoreColor=score>=85?'var(--green)':score>=70?'var(--yellow)':'var(--red)';

  function exportMd(){
    const lines=[
      `# Raqmetrics Launch Plan — ${data.brand||'Campaign'}`,
      `**Decision: ${decision.verdict}** | Score: ${score}/100`,``,
      `## Campaign Brief`,
      `- Brand: ${data.brand||'—'}`,`- Product: ${data.product||'—'}`,`- Market: ${data.country||'—'}`,
      `- Objective: ${data.objective||'—'}`,`- Business Goal: ${data.businessGoal||'—'}`,
      `- Channels: ${chs.join(', ')}`,`- Budget: $${monthly}/mo · ${days} days · $${total} total`,``,
      `## ICP & Offer`,
      `- ICP: ${data.primaryICP||'—'}`,`- Offer Problem: ${data.offerProblem||'—'}`,
      `- Offer Promise: ${data.offerPromise||'—'}`,`- Why Now: ${data.whyNow||'—'}`,``,
      `## Message Hypotheses`,
      ...(data.msgHypotheses||[]).map((h,i)=>`${i+1}. [${h.type}] Hook: ${h.hook||'—'} | Promise: ${h.promise||'—'}`),``,
      `## Budget`,
      `- Monthly: $${monthly} | Daily: $${daily} | Flight: ${days} days`,
      `- Target CAC: $${tCAC} | Break-even ROAS: ${beROAS}x`,``,
      `## Structure`,
      `- ${nc} campaigns × ${nas} adsets × ${nads} ads per channel`,`- Total ads: ${nc*chs.length*nas*nads}`,``,
      `## Naming Convention`,
      `- Campaign: ${campPrev}`,`- Adset: ${adsetPrev}`,`- Ad: ${adPrev}`,``,
      `## Tracking`,
      `- Landing Page: ${data.landingPage||'—'}`,`- UTM Campaign: ${data.utmCampaign||'—'}`,``,
      `## Readiness Score: ${score}/100 — ${decision.verdict}`,
      ...(decision.blockers.length>0?[`### Blockers:`,...decision.blockers.map(b=>`- ⛔ ${b}`)]:[]),
      ...(risks.length>0?[`### Risks:`,...risks.map(r=>`- ⚠ ${r}`)]:[]),

    const blob=new Blob([lines.join('\n')],{type:'text/markdown'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);

            {k:'Daily Budget',v:f$(daily,2)},{k:'Target CAC',v:f$(tCAC,2)},{k:'Break-Even ROAS',v:fx(beROAS)},
          ].map(({k,v})=><div key={k} className="summary-row"><span className="sr-key">{k}</span><span className="sr-val" style={{fontFamily:'var(--f-m)',color:'var(--amber)'}}>{v}</span></div>)}
          {chs.map(ch=>{const pct=(chSplits[ch]||Math.round(100/chs.length));return(<div key={ch} className="summary-row"><span className="sr-key">{ch}</span><span className="sr-val" style={{fontFamily:'var(--f-m)'}}>{f$(+(monthly*pct/100).toFixed(0))} ({pct}%)</span></div>);})}
        </Card>
        <Card className="card-accent" style={{marginBottom:'1.25rem'}}>
          <h3 style={{fontFamily:'var(--f-d)',fontSize:'1.05rem',fontWeight:900,marginBottom:'.85rem',letterSpacing:'-.02em'}}>Structure & Naming</h3>
          {[
            {k:'Total Campaigns',v:nc*chs.length},{k:'Total Adsets',v:nc*chs.length*nas},
            {k:'Total Ads',v:nc*chs.length*nas*nads},{k:'Creatives Needed',v:nc*chs.length*nas*nads},
          ].map(({k,v})=><div key={k} className="summary-row"><span className="sr-key">{k}</span><span className="sr-val" style={{fontFamily:'var(--f-m)',color:'var(--amber)',fontWeight:700}}>{v}</span></div>)}
          <Divider/>
          {[{l:'Campaign',v:campPrev},{l:'Adset',v:adsetPrev},{l:'Ad',v:adPrev}].map(({l,v})=>(
            <div key={l} style={{marginBottom:'.65rem'}}>
              <div style={{fontFamily:'var(--f-m)',fontSize:'.6rem',letterSpacing:'.1em',textTransform:'uppercase',color:'var(--ink50)',marginBottom:'.25rem'}}>{l}</div>
              <div className="preview-box" style={{fontSize:'.72rem',paddingRight:'4.5rem'}}>{v||'—'}<CopyBtn text={v}/></div>
            </div>
          ))}
        </Card>
        <Card className="card-accent">
          <h3 style={{fontFamily:'var(--f-d)',fontSize:'1.05rem',fontWeight:900,marginBottom:'.85rem',letterSpacing:'-.02em'}}>Creative Brief</h3>
          {[
            {k:'Formats',v:(data.creativeFormats||[]).join(', ')||'—'},{k:'Angles',v:(data.creativeAngles||[]).join(', ')||'—'},
            {k:'Primary CTA',v:data.cta||'—'},{k:'Key USP',v:data.usp||'—'},{k:'Offer',v:data.offer||'—'},
          ].map(({k,v})=><div key={k} className="summary-row"><span className="sr-key">{k}</span><span className="sr-val">{v}</span></div>)}
          <Divider/>
          <div className="summary-row"><span className="sr-key">Tracking URL</span><span className="sr-val" style={{fontSize:'.72rem',wordBreak:'break-all',color:'var(--blue)'}}>{data.landingPage||'—'}</span></div>
        </Card>
      </div>
    </div>
    <div style={{textAlign:'center',padding:'1rem 0',color:'var(--ink50)',fontFamily:'var(--f-m)',fontSize:'.65rem',letterSpacing:'.1em',textTransform:'uppercase'}}>
      Built with Raqmetrics Launch OS · raqmetrics.com
    </div>
    <StepNav onBack={onBack} backLabel="← Checklist" onNext={()=>{}} nextLabel=""/>
  </div>);
}

/* ═══════════════════════════════════════
   HERO
═══════════════════════════════════════ */
function Hero({onStart,savedData,onClear}){
  return(<div className="hero-banner">
    <div style={{maxWidth:640}}>
      <div className="page-eyebrow" style={{justifyContent:'center',marginBottom:'1.2rem'}}>Launch Readiness & Risk Reduction System</div>
      <h1>Know if your campaign is<br/><em>ready</em> to launch.</h1>
      <p>A 11-module pre-launch validation OS — from offer clarity to Go/No-Go decision. Stop guessing. Start with signal.</p>
      <div className="module-pills">
        {['01 Brief','02 Offer & ICP','03 Audience','04 Budget','05 Benchmarks','06 Structure','07 Naming','08 Creative','09 Tracking','10 Checklist','11 Launch Decision'].map(m=><span key={m} className="module-pill">{m}</span>)}
      </div>
      <div style={{display:'flex',gap:'1rem',justifyContent:'center',flexWrap:'wrap'}}>
        <button className="btn-primary" onClick={onStart} style={{fontSize:'.85rem',padding:'.85rem 2.5rem'}}>
          {savedData?'Continue Planning →':'Start Readiness Audit →'}
        </button>
        {savedData&&<button className="btn-ghost" onClick={onClear} style={{fontSize:'.85rem',padding:'.85rem 2rem'}}>Start Fresh</button>}
      </div>
      {savedData&&<div style={{marginTop:'1rem',fontFamily:'var(--f-m)',fontSize:'.65rem',color:'var(--ink30)',letterSpacing:'.08em'}}>Progress saved · {savedData.brand||'Unnamed campaign'}</div>}
    </div>
  </div>);
}

/* ═══════════════════════════════════════
   ROOT APP
═══════════════════════════════════════ */
const STEPS=[
  {id:'brief',label:'Brief',icon:'📋'},
  {id:'offer',label:'Offer & ICP',icon:'💡'},
  {id:'audience',label:'Audience',icon:'👥'},
  {id:'budget',label:'Budget',icon:'💰'},
  {id:'benchmarks',label:'Benchmarks',icon:'📊'},
  {id:'structure',label:'Structure',icon:'🏗'},
  {id:'naming',label:'Naming',icon:'🏷'},
  {id:'creative',label:'Creative',icon:'🎨'},
  {id:'tracking',label:'Tracking',icon:'📡'},
  {id:'checklist',label:'Checklist',icon:'✅'},
  {id:'summary',label:'Launch Decision',icon:'🚀'},
];

function isDone(id,data){
  switch(id){
    case 'brief':return!!(data.brand&&data.businessGoal&&data.businessGoal.length>5&&(data.channels||[]).length>0);
    case 'offer':return!!(data.offerProblem&&data.offerPromise&&data.primaryICP);
    case 'audience':return!!(data.ageMin&&data.ageMax);
    case 'budget':return!!(data.monthlyBudget&&data.monthlyBudget>0);
    case 'benchmarks':return true;
    case 'structure':return!!(data.numCampaigns&&data.adsetsPerCampaign&&data.adsPerAdset);
    case 'naming':return!!(data.campTokens&&data.campTokens.length>0);
    case 'creative':return!!(data.creativeFormats&&data.creativeFormats.length>0&&(data.creativeAngles||[]).length>=2);
    case 'tracking':return!!(data.landingPage);
    case 'checklist':return Object.values(data.launchChecked||{}).filter(Boolean).length>15;
    case 'summary':return false;
    default:return false;
  }
}

const DEFAULT_DATA={
  channels:['Meta','Google'],stages:['COLD','WARM','HOT'],kpis:['ROAS','CPA','CTR'],
  country:'UAE',industry:'Ecommerce',funnelType:'Ecom',objective:'Conversions',
  launchType:'New Campaign',gender:'All',ageMin:18,ageMax:45,monthlyBudget:5000,
  grossMargin:.40,aov:150,numCampaigns:2,adsetsPerCampaign:3,adsPerAdset:4,
  coldPct:70,warmPct:20,hotPct:10,
  creativeFormats:['Video (15s)','Static Image'],
  creativeAngles:['Pain Point','Offer / Discount','Social Proof'],
  cta:'Shop Now',benchScenario:'base',
};

function App(){
  const [started,setStarted]=useState(false);
  const [step,setStep]=useState(0);

  // Load from localStorage
  const saved=useMemo(()=>{try{const s=localStorage.getItem('rqm-data');return s?JSON.parse(s):null;}catch(e){return null;}},[]);
  const [data,setData]=useState(()=>{
    try{const s=localStorage.getItem('rqm-data');return s?JSON.parse(s):DEFAULT_DATA;}catch(e){return DEFAULT_DATA;}
  });

  // Autosave
  useEffect(()=>{
    try{
      localStorage.setItem('rqm-data',JSON.stringify(data));
      const el=document.getElementById('autosaveStatus');
      if(el){el.style.color='var(--green)';setTimeout(()=>{if(el)el.style.color='';},1000);}
    }catch(e){}
  },[data]);

  const done=STEPS.filter(s=>isDone(s.id,data)).length;
  const pct=Math.round(done/STEPS.length*100);
  const {score}=useMemo(()=>calcReadinessScore(data),[data]);
  const scoreColor=score>=85?'var(--green)':score>=70?'var(--yellow)':'var(--red)';

  const go=(n)=>{setStep(n);window.scrollTo({top:0,behavior:'smooth'})};

  function clearData(){
    localStorage.removeItem('rqm-data');
    setData(DEFAULT_DATA);
    setStarted(false);
  }

  if(!started) return <Hero onStart={()=>setStarted(true)} savedData={saved?.brand?saved:null} onClear={clearData}/>;

  return(<div className="shell">
    <aside className="sidebar">
      <div style={{flex:'0 0 auto'}}>
        {STEPS.map((s,i)=>{
          const d=isDone(s.id,data);
          return(<button key={s.id} className={`sb-btn${step===i?' on':''}${d?' done':''}`} onClick={()=>go(i)}>
            <span className="sb-num">{i+1}</span>{s.icon} {s.label}<span className="sb-check">✓</span>
          </button>);
        })}
      </div>
      <div style={{flex:1}}/>
      <div className="sb-progress">
        <div style={{fontFamily:'var(--f-d)',fontWeight:900,fontSize:'2rem',textAlign:'center',color:scoreColor,lineHeight:1}}>{score}</div>
        <div style={{fontFamily:'var(--f-m)',fontSize:'.55rem',letterSpacing:'.12em',textTransform:'uppercase',color:'var(--ink30)',textAlign:'center',marginBottom:'.85rem'}}>Readiness Score</div>
        <div className="sb-prog-label"><span>Modules Complete</span><span>{pct}%</span></div>
        <div className="prog-track"><div className="prog-fill" style={{width:pct+'%'}}/></div>
        <div style={{marginTop:'1rem',display:'flex',gap:'.4rem',justifyContent:'center',flexWrap:'wrap'}}>
          <button className="btn-sm" onClick={clearData} style={{fontSize:'.55rem'}}>Reset</button>
        </div>
      </div>
    </aside>
    <main className="main">
      {step===0&&<BriefSheet data={data} setData={setData} onNext={()=>go(1)}/>}
      {step===1&&<OfferICPSheet data={data} setData={setData} onNext={()=>go(2)} onBack={()=>go(0)}/>}
      {step===2&&<AudienceSheet data={data} setData={setData} onNext={()=>go(3)} onBack={()=>go(1)}/>}
      {step===3&&<BudgetSheet data={data} setData={setData} onNext={()=>go(4)} onBack={()=>go(2)}/>}
      {step===4&&<BenchmarksSheet data={data} setData={setData} onNext={()=>go(5)} onBack={()=>go(3)}/>}
      {step===5&&<StructureSheet data={data} setData={setData} onNext={()=>go(6)} onBack={()=>go(4)}/>}
      {step===6&&<NamingSheet data={data} setData={setData} onNext={()=>go(7)} onBack={()=>go(5)}/>}
      {step===7&&<CreativeSheet data={data} setData={setData} onNext={()=>go(8)} onBack={()=>go(6)}/>}
      {step===8&&<TrackingSheet data={data} setData={setData} onNext={()=>go(9)} onBack={()=>go(7)}/>}
      {step===9&&<ChecklistSheet data={data} setData={setData} onNext={()=>go(10)} onBack={()=>go(8)}/>}
      {step===10&&<SummarySheet data={data} onBack={()=>go(9)} goToStep={go}/>}
    </main>
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
